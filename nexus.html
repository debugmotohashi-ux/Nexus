    prompt:`以下の内容をもとに、教育共有文を作成してください。

目的は、教育内容を上長・関係者に共有するためです。
文体は、硬すぎず、ただし軽すぎない「教育共有として見やすい文章」にしてください。
内容は省略せず、伝わりやすいように整理してください。

【作成ルール】
・下記フォーマットを必ず使用する
・見出しは変えない
・内容は箇条書き中心で見やすく整理する
・教育の意図、指導内容、対象者の反応、今後の課題が伝わるようにする
・AIっぽく硬すぎる表現は避ける
・現場感が伝わる自然な文章にする
・「〜してます」「〜確認してます」「〜共有してます」など、本橋さんの共有文に近い言い回しを使う
・必要に応じて、内容を①②③のように項目分けする
・反応欄は、できている点と今後の課題が両方伝わるようにまとめる

【フォーマット】

【教育共有】

■実施日
〇月〇日(〇)

■実施者
〇〇

■対象
〇〇さん／〇〇くん

■テーマ
〇〇

■目的
・〇〇
・〇〇
・〇〇

■内容
①〇〇
本文

②〇〇
本文

③〇〇
本文

※内容に応じて項目数は増減してOKです。

■反応
本文

対象者の理解度、良かった点、まだ課題として残っている点、今後反復が必要な部分を整理してください。

【元情報(教育内容の文字起こし)】

---

` },
  other: { label:'📱 その他（LINE報告）', cat:'general',
    prompt:`以下の文字起こしをもとに、LINEでそのまま送れる報告文を作成してください。

【作成ルール】
・冒頭に【報告】と用件の見出しを付ける
・要点を箇条書き中心で簡潔に整理する
・誤字脱字や言い淀みを整える
・硬すぎず、現場感の伝わる自然な文章にする
・長くなりすぎないようにする

【元テキスト(文字起こし)】

---

` },
};

function EchoScreen() {
  const { sb, user, store, fetchTable } = useApp();
  const [fmt, setFmt] = useState('interview');
  const [transcript, setTranscript] = useState('');
  const [minutes, setMinutes] = useState('');
  const [showMinutes, setShowMinutes] = useState(false);
  const [finalText, setFinalText] = useState('');
  const [pickStaff, setPickStaff] = useState('');
  const [pickDate, setPickDate] = useState('');
  const [autoName, setAutoName] = useState('');
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState(false);
  const [copied, setCopied] = useState(false);

  const def = ECHO_FORMATS[fmt];

  // 名前照合（敬称・空白除去 → 完全一致 → 部分一致）
  const resolveStaff = (raw) => {
    if (!raw) return null;
    const name = String(raw).replace(/さん|くん|君|氏|様/g,'').replace(/[\s　]+/g,'').trim();
    if (!name) return null;
    const staff = (store.staff||[]);
    let hit = staff.find(s => s.name === name);
    if (!hit) hit = staff.find(s => name.includes(s.name) || s.name.includes(name));
    return hit || null;
  };

  // 日付正規化（2026-07-03 / 2026/7/3 / 7月3日(金) → ISO）
  const normalizeDate = (raw) => {
    if (!raw) return '';
    let m = String(raw).match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
    if (m) return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
    m = String(raw).match(/(\d{1,2})月(\d{1,2})日/);
    if (m) {
      const now = new Date();
      let y = now.getFullYear();
      const cand = new Date(y, +m[1]-1, +m[2]);
      if (cand.getTime() - now.getTime() > 90*24*3600*1000) y -= 1;
      return y+'-'+String(m[1]).padStart(2,'0')+'-'+String(m[2]).padStart(2,'0');
    }
    return '';
  };

  // 完成文から対象者・実施日を抽出（面談=同一行 / 教育=次行 両対応）
  const extract = (text) => {
    let name = '';
    const m1 = text.match(/対象者[:：]\s*(.+)/);
    if (m1) name = m1[1].trim();
    if (!name) {
      const lines = text.split('\n');
      for (let i=0;i<lines.length;i++){
        if (lines[i].replace(/[\s　]/g,'') === '■対象' || lines[i].replace(/[\s　]/g,'').startsWith('■対象')) { name=(lines[i+1]||'').trim(); break; }
      }
    }
    let dateRaw = '';
    const m2 = text.match(/実施日[:：]\s*(.+)/);
    if (m2) dateRaw = m2[1].trim();
    if (!dateRaw) {
      const lines = text.split('\n');
      for (let i=0;i<lines.length;i++){
        if (lines[i].replace(/[\s　]/g,'').startsWith('■実施日')) { dateRaw=(lines[i+1]||'').trim(); break; }
      }
    }
    return { name, date: normalizeDate(dateRaw) };
  };

  // 完成文の貼り付けで自動抽出→チップに反映
  useEffect(() => {
    const t = finalText.trim();
    if (!t) { setPickStaff(''); setPickDate(''); setAutoName(''); return; }
    const ex = extract(t);
    setAutoName(ex.name);
    const hit = resolveStaff(ex.name);
    setPickStaff(hit ? hit.id : '');
    setPickDate(ex.date || localIso().slice(0,10));
  }, [finalText]);

  // ChatGPTへ（コピー→アプリ直接起動。アプリが無い時だけWeb版へフォールバック）
  const toChatGPT = async () => {
    const t = transcript.trim();
    if (!t) return;
    let payload = def.prompt + t;
    if (minutes.trim()) {
      payload += '\n\n【手打ち議事録（この内容も統合し、文字起こしに不足している部分を補い、重複する部分は精査して一本化してください）】\n\n' + minutes.trim();
    }
    try { await navigator.clipboard.writeText(payload); setCopied(true); setTimeout(()=>setCopied(false),2500); } catch(e){}
    // アプリ内ブラウザを経由せず ChatGPT アプリを直接起動（白画面が残る問題の対策）
    let appOpened = false;
    const onHide = () => { if (document.visibilityState === 'hidden') appOpened = true; };
    document.addEventListener('visibilitychange', onHide);
    window.location.href = 'chatgpt://';
    setTimeout(() => {
      document.removeEventListener('visibilitychange', onHide);
      if (!appOpened) {
        const q = payload.length < 1500 ? ('?q=' + encodeURIComponent(payload)) : '';
        const url = 'https://chat.openai.com/' + q;
        const w = window.open(url, '_blank');
        if (!w) window.location.href = url;
      }
    }, 1200);
  };

  // ナレッジ保存＋最終日更新
  const save = async () => {
    const t = finalText.trim();
    if (!t || saving) return;
    setSaving(true);
    try {
      const cat = def.cat;
      const staffObj = (store.staff||[]).find(s=>s.id===pickStaff) || null;
      const dateIso = pickDate || localIso().slice(0,10);
      const labelPlain = def.label.replace(/^[^ ]+ /,'');
      const title = (cat==='interview'?'面談共有：':cat==='education'?'教育共有：':'共有：') + (staffObj?staffObj.name:(autoName||labelPlain)) + '（'+dateIso+'）';
      // 既存の抽出ロジック互換のため実施日メタを付加
      const contentVal = t + '\n\n─────────────────\n■ 実施日\n' + dateIso + '\n■ 誰に\n' + (staffObj?staffObj.name:(autoName||'')) + '\n出典：ECHO';
      const row = {
        user_id: user.id, title, category: cat,
        content: contentVal,
        tags: ['echo', cat],
        source_ref: 'ECHO',
      };
      if (staffObj) row.staff_id = staffObj.id;
      await sb.from('knowledge_items').insert(row);
      // 最終教育日・最終面談日の更新（新しい場合のみ・巻き戻し防止）
      if (staffObj && (cat==='education' || cat==='interview')) {
        const field = cat==='education' ? 'last_education_at' : 'last_interview_at';
        const prev = staffObj[field] || null;
        if (!prev || dateIso >= prev) {
          await sb.from('staff_profiles').update({ [field]: dateIso }).eq('id', staffObj.id).eq('user_id', user.id);
        }
      }
      await fetchTable('knowledge');
      await fetchTable('staff');
      setDone(true);
    } catch(e) { alert('保存に失敗しました：' + (e.message||e)); }
    setSaving(false);
  };

  const resetAll = () => { setTranscript(''); setMinutes(''); setShowMinutes(false); setFinalText(''); setPickStaff(''); setPickDate(''); setAutoName(''); setDone(false); };

  const taCls = 'w-full rounded-xl border border-slate-200 bg-white p-3 text-sm text-slate-700 focus:border-indigo-400 focus:outline-none';
  const needsStaff = fmt !== 'other';

  if (done) {
    return (
      <>
        <PageHeader title="ECHO" subtitle="文字起こし→共有文→保存"/>
        <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-6 text-center space-y-3">
          <div className="text-3xl">✅</div>
          <div className="text-sm font-semibold text-emerald-700">ナレッジに保存しました</div>
          {pickStaff && needsStaff && <div className="text-xs text-emerald-600">スタッフに紐づけ、実施日も更新済みです</div>}
          <Btn onClick={resetAll}>続けて入力する</Btn>
        </div>
      </>
    );
  }

  return (
    <>
      <PageHeader title="ECHO" subtitle="文字起こし→共有文→保存"/>

      {/* ① 種別 */}
      <div className="mb-4">
        <div className="text-xs font-semibold text-slate-500 mb-2">① 種別を選ぶ</div>
        <div className="grid grid-cols-3 gap-2">
          {Object.entries(ECHO_FORMATS).map(([k,v])=>(
            <button key={k} onClick={()=>setFmt(k)}
              className={cn('rounded-xl border px-2 py-2.5 text-xs font-medium transition-colors',
                fmt===k?'border-emerald-500 bg-emerald-50 text-emerald-700':'border-slate-200 bg-white text-slate-600')}>
              {v.label}
            </button>
          ))}
        </div>
      </div>

      {/* ② 文字起こし */}
      <div className="mb-4">
        <div className="text-xs font-semibold text-slate-500 mb-2">② 文字起こしを貼り付け</div>
        <textarea value={transcript} onChange={e=>setTranscript(e.target.value)} rows={7}
          placeholder="ボイスメモ / レコーダーの文字起こしをここに貼り付け" className={taCls}/>
        <button onClick={()=>setShowMinutes(v=>!v)} className="mt-2 text-xs text-indigo-500">
          {showMinutes ? '－ 手打ち議事録を閉じる' : '＋ 手打ち議事録がある場合はこちら'}
        </button>
        {showMinutes && (
          <textarea value={minutes} onChange={e=>setMinutes(e.target.value)} rows={5}
            placeholder="手打ちの議事録を貼り付け（文字起こしと統合・精査されます）" className={cn(taCls,'mt-2')}/>
        )}
      </div>

      {/* ③ ChatGPTへ */}
      <div className="mb-6">
        <Btn className="w-full" onClick={toChatGPT} disabled={!transcript.trim()}>
          🚀 ChatGPTへ（プロンプト付きでコピー＆起動）
        </Btn>
        {copied && <div className="mt-1.5 text-center text-xs text-emerald-600">コピーしました。開いた画面に貼り付けてください</div>}
        <div className="mt-1 text-center text-[10px] text-slate-400">短文は自動入力／長文はコピー済みの状態で開きます</div>
      </div>

      {/* ④ 完成文→保存 */}
      <div className="mb-4">
        <div className="text-xs font-semibold text-slate-500 mb-2">③ 完成した共有文を貼り付け</div>
        <textarea value={finalText} onChange={e=>setFinalText(e.target.value)} rows={8}
          placeholder="ChatGPTの出力をここに貼り付けると、対象スタッフと実施日を自動で読み取ります" className={taCls}/>
      </div>

      {finalText.trim() && (
        <div className="mb-4 rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2.5">
          <div className="text-xs font-semibold text-slate-500">読み取り結果（タップで修正できます）</div>
          {needsStaff && (
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-500 w-14 shrink-0">対象</span>
              <select value={pickStaff} onChange={e=>setPickStaff(e.target.value)}
                className="flex-1 rounded-lg border border-slate-200 bg-white px-2 py-1.5 text-sm">
                <option value="">（未選択）</option>
                {(store.staff||[]).filter(s=>s.is_active!==false).map(s=>(
                  <option key={s.id} value={s.id}>{s.name}</option>
                ))}
              </select>
            </div>
          )}
          {needsStaff && !pickStaff && (
            <div className="text-[11px] text-amber-600">⚠ スタッフ未選択のまま保存すると紐づけ・実施日更新はされません{autoName?('（読み取り名：'+autoName+'）'):''}</div>
          )}
          <div className="flex items-center gap-2">
            <span className="text-xs text-slate-500 w-14 shrink-0">実施日</span>
            <input type="date" value={pickDate} onChange={e=>setPickDate(e.target.value)}
              className="flex-1 rounded-lg border border-slate-200 bg-white px-2 py-1.5 text-sm"/>
          </div>
          <Btn className="w-full" onClick={save} disabled={saving}>
            {saving ? '保存中…' : '💾 ナレッジとして保存'}
          </Btn>
        </div>
      )}
    </>
  );
}

// ─── 未紐づけログ削除ツール ───────────────────────────────
function UnlinkedCleanup({ onClose }) {
  const { sb, user, store, fetchTable } = useApp();
  const [cat, setCat] = useState('education');
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState({});
  const [deleting, setDeleting] = useState(false);
  const [done, setDone] = useState(0);

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('knowledge_items').select('*').eq('user_id', user.id)
      .eq('category', cat).order('created_at',{ascending:false});
    // staff_idが空＝未紐づけ のものだけ
    const unlinked = (data||[]).filter(k => !k.staff_id);
    setLogs(unlinked);
    setSelected({});
    setLoading(false);
  };
  useEffect(()=>{ load(); }, [cat]);

  const getWho = (c) => {
    const lines=(c||'').split('\n');
    for(let i=0;i<lines.length;i++){ if(lines[i].includes('■ 誰に')) return (lines[i+1]||'').trim(); }
    return '';
  };
  const getDate = (c) => {
    const lines=(c||'').split('\n');
    for(let i=0;i<lines.length;i++){ if(lines[i].includes('■ 実施日')) return (lines[i+1]||'').trim(); }
    return '';
  };

  const toggle = (id) => setSelected(s=>({...s,[id]:!s[id]}));
  const selectAll = () => {
    const all = {}; logs.forEach(l=>all[l.id]=true); setSelected(all);
  };
  const clearAll = () => setSelected({});

  const delSelected = async () => {
    const ids = Object.keys(selected).filter(k=>selected[k]);
    if (ids.length === 0) return;
    if (!confirm(ids.length+'件を削除します。元に戻せません。よろしいですか？')) return;
    setDeleting(true);
    for (const id of ids) {
      await sb.from('knowledge_items').delete().eq('id', id).eq('user_id', user.id);
    }
    await fetchTable('knowledge');
    setDeleting(false); setDone(ids.length);
    load();
  };

  const selCount = Object.values(selected).filter(Boolean).length;

  return (
    <FullModal title="未紐づけログの削除" onClose={onClose}>
      <p className="text-xs text-slate-500">スタッフに紐づいていないログだけを表示します。紐づいているものは表示されないので、誤って消すことはありません。</p>

      <div className="flex rounded-xl border border-slate-200 bg-slate-50 p-1 gap-1">
        {[{k:'education',l:'📚 教育'},{k:'interview',l:'💬 面談'},{k:'meeting',l:'🤝 MTG'}].map(({k,l})=>(
          <button key={k} onClick={()=>setCat(k)}
            className={cn('flex-1 rounded-lg py-2 text-xs font-medium', cat===k?'bg-white text-indigo-700 shadow-sm':'text-slate-500')}>{l}</button>
        ))}
      </div>

      {done>0 && <div className="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-xs text-emerald-700">{done}件を削除しました</div>}

      {loading ? <LoadingState/> : logs.length===0 ? (
        <EmptyState message="未紐づけのログはありません"/>
      ) : (
        <>
          <div className="flex items-center justify-between">
            <span className="text-xs text-slate-500">未紐づけ {logs.length}件</span>
            <div className="flex gap-2">
              <button onClick={selectAll} className="text-xs text-indigo-600">全選択</button>
              <button onClick={clearAll} className="text-xs text-slate-400">解除</button>
            </div>
          </div>
          <div className="space-y-1 max-h-80 overflow-y-auto">
            {logs.map(l=>(
              <button key={l.id} onClick={()=>toggle(l.id)}
                className={cn('w-full flex items-center gap-2 rounded-lg border px-3 py-2 text-left',
                  selected[l.id]?'border-rose-300 bg-rose-50':'border-slate-200 bg-white')}>
                <div className={cn('h-4 w-4 shrink-0 rounded border flex items-center justify-center',
                  selected[l.id]?'border-rose-500 bg-rose-500':'border-slate-300')}>
                  {selected[l.id] && <CheckIcon size={10} className="text-white"/>}
                </div>
                <span className="font-mono text-xs text-slate-400 shrink-0">{getDate(l.content)}</span>
                <span className="text-xs text-slate-400 shrink-0">{getWho(l.content)||'—'}</span>
                <span className="flex-1 truncate text-xs text-slate-600">{l.title}</span>
                <span className="text-[10px] text-slate-300 shrink-0">{l.source_ref}</span>
              </button>
            ))}
          </div>
          <Btn variant="danger" className="w-full" onClick={delSelected} disabled={deleting||selCount===0}>
            <TrashIcon size={14}/> {deleting?'削除中...':`選択した${selCount}件を削除`}
          </Btn>
        </>
      )}
    </FullModal>
  );
}

function InputHub() {
  const { sb, user, store, fetchTable } = useApp();
  const [showCleanup, setShowCleanup] = useState(false);
  const [picked, setPicked] = useState('');
  const [json, setJson] = useState('');
  const [list, setList] = useState(null);
  const [mode, setMode] = useState('');
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);
  const [progress, setProgress] = useState('');
  const [done, setDone] = useState(0);
  const [promptCopied, setPromptCopied] = useState(false);
  const fileRef = useRef(null);

  const def = picked ? HUB_TYPES[picked] : null;

  const reset = () => { setJson(''); setList(null); setErr(''); setDone(0); setMode(''); };
  const pick = (k) => { setPicked(k); reset(); };

  const copyPrompt = async () => {
    if (!def) return;
    try { await navigator.clipboard.writeText(def.prompt); setPromptCopied(true); setTimeout(()=>setPromptCopied(false),2000); } catch(e){}
  };
  const onFile = (e) => {
    const f = e.target.files?.[0]; if(!f) return;
    const r = new FileReader(); r.onload=()=>{ setJson(String(r.result||'')); setList(null); setErr(''); }; r.readAsText(f);
  };

  const doParse = () => {
    setErr('');
    try {
      const data = JSON.parse(cleanJsonInput(json));
      const arr = Array.isArray(data) ? data : [data];
      if (arr.length === 0) { setErr('レコードが見つかりませんでした。'); return; }
      setList(arr);
    } catch(e){ setErr('JSONとして読み取れませんでした。'); }
  };

  const resolveStaffId = (name) => {
    if (!name) return null;
    const hit = (store.staff||[]).find(s => name.includes(s.name) || s.name.includes(name));
    return hit ? hit.id : null;
  };
  const getWho = (content) => {
    const lines=(content||'').split('\n');
    for(let i=0;i<lines.length;i++){ if(lines[i].includes('■ 誰に')) return (lines[i+1]||'').trim(); }
    return '';
  };

  const doImport = async () => {
    if (!list) return;
    setSaving(true);
    let ok = 0;

    if (picked==='nexuscore') {
      for (let i=0;i<list.length;i++){
        const d=list[i]; setProgress((i+1)+' / '+list.length);
        const ct = (d.category==='identity'||d.category==='genesis') ? d.category : null;
        if (!ct || !d.content) continue;
        await sb.from('nexus_core').insert({
          user_id:user.id, core_type:ct, title:d.title||'',
          content:d.content, sequence: (d.sequence!=null?d.sequence:null), version:1,
        });
        ok++;
      }
    } else if (picked==='staff') {
      for (let i=0;i<list.length;i++){
        const d=list[i]; setProgress((i+1)+' / '+list.length);
        if (!d.name) continue;
        await sb.from('staff_profiles').insert({
          user_id:user.id, name:d.name, role:d.role||'',
          relationship_type:d.relationship_type||'スタッフ',
          strengths:d.strengths||'', weaknesses:d.weaknesses||'', notes:d.notes||'',
          is_active:true,
        });
        ok++;
      }
      await fetchTable('staff');
    } else if (picked==='schedule') {
      const validCats = Object.keys(SCHED_CATS);
      for (let i=0;i<list.length;i++){
        const d=list[i]; setProgress((i+1)+' / '+list.length);
        const cat = validCats.includes(d.category)?d.category:(validCats.includes(d.type)?d.type:'other');
        const topic = d.mtg_topic||d.topic||'';
        const title = d.title || (cat==='meeting'?topic:(d.staff_name?d.staff_name+(cat==='education'?' 教育':cat==='interview'?' 面談':''):''));
        if (!title) continue;
        await sb.from('schedules').insert({
          user_id:user.id, title, type:'meeting', category:cat,
          staff_name:d.staff_name||'', assignee:d.assignee||'',
          mtg_topic: cat==='meeting'?(topic||null):null,
          scheduled_date:d.scheduled_date||d.date||null, status:'todo', notes:d.notes||'',
        });
        // staff next date sync
        if (d.staff_name && (d.scheduled_date||d.date)) {
          const sid = resolveStaffId(d.staff_name);
          const field = cat==='education'?'next_education_at':cat==='interview'?'next_interview_at':null;
          if (sid && field) await sb.from('staff_profiles').update({ [field]: d.scheduled_date||d.date }).eq('id',sid).eq('user_id',user.id);
        }
        ok++;
      }
      await fetchTable('schedules');
    } else {
      // knowledge系（education/interview/meeting/interview_os）
      const VALID = ['general','education','interview','meeting','performance','memory','goal','value','judgment_rule','anti_pattern','relationship_view','style_rule','principle','workflow','skill_memo','client','market','template','other'];
      for (let i=0;i<list.length;i++){
        const d=list[i]; setProgress((i+1)+' / '+list.length);
        // インタビュー独自フィールドをcontentに埋め込み
        let contentVal = d.content||'';
        const meta=[];
        if (d.importance) meta.push('重要度:'+d.importance);
        if (d.confidence) meta.push('確度:'+d.confidence);
        if (Array.isArray(d.related_staff)&&d.related_staff.length) meta.push('関連:'+d.related_staff.join('・'));
        if (d.interview_date) meta.push('実施日:'+d.interview_date);
        if (d.raw_excerpt) meta.push('原文:'+d.raw_excerpt);
        if (d.notes) meta.push('補足:'+d.notes);
        if (meta.length) contentVal = contentVal+'\n\n─────────────────\n'+meta.join('\n');
        let tags = Array.isArray(d.tags)?d.tags:(d.tags?[d.tags]:[]);
        if (d.source==='本橋OSインタビュー') tags=[...new Set([...tags,'interview','motohashi_os'])];
        // staff_id解決
        let staffId = d.staff_id || null;
        if (!staffId && (d.category==='education'||d.category==='interview')) staffId = resolveStaffId(getWho(d.content));
        if (!staffId && d.category==='performance') staffId = resolveStaffId(d.staff_name || getWho(d.content));
        const row = {
          user_id:user.id, title:d.title||'',
          category: VALID.includes(d.category)?d.category:'general',
          content:contentVal, tags,
          source_ref: d.source||d.source_ref||'入力ハブ',
        };
        if (staffId) row.staff_id = staffId;
        if (d.mtg_topic) row.mtg_topic = d.mtg_topic;
        if (d.participants) row.participants = d.participants;
        const { data: ins } = await sb.from('knowledge_items').insert(row).select('id').single();
        // MTG参加者をスタッフに紐づけ
        if (d.category==='meeting' && d.participants && ins) {
          let pstr = String(d.participants);
          ['、',',','/','／',' '].forEach(sep=>{ pstr = pstr.split(sep).join('・'); });
          const names = pstr.split('・').map(s=>s.trim()).filter(Boolean);
          for (const nm of names) {
            const sid = resolveStaffId(nm);
            if (sid) await sb.from('mtg_participants').insert({ user_id:user.id, knowledge_id:ins.id, staff_id:sid });
          }
        }
        // スタッフの最終教育日／最終面談日を更新（education / interview のみ）
        if (staffId && (d.category==='education' || d.category==='interview')) {
          const field = d.category==='education' ? 'last_education_at' : 'last_interview_at';
          // contentの「■ 実施日」から日付を抽出（なければ今日）
          let edate = null;
          const clines = String(contentVal||'').split('\n');
          for (let j=0;j<clines.length;j++){
            if (clines[j].includes('■ 実施日')) { edate = (clines[j+1]||'').trim().slice(0,10) || null; break; }
          }
          if (!edate && d.interview_date) edate = String(d.interview_date).slice(0,10);
          if (!edate) edate = localIso().slice(0,10);
          // 既存の最終日より新しい場合のみ更新（古い記録の取り込みで上書きしない）
          const cur = (store.staff||[]).find(s => s.id===staffId);
          const prev = cur ? cur[field] : null;
          if (!prev || edate >= prev) {
            await sb.from('staff_profiles').update({ [field]: edate }).eq('id', staffId).eq('user_id', user.id);
          }
        }
        ok++;
      }
      await fetchTable('knowledge');
      await fetchTable('staff');
    }
    setProgress(''); setSaving(false); setDone(ok);
  };

  return (
    <>
      <PageHeader title="入力ハブ" subtitle="ここから全部入力できます"
        action={<Btn variant="outline" size="sm" onClick={()=>setShowCleanup(true)}>🧹 重複削除</Btn>}/>
      {showCleanup && <UnlinkedCleanup onClose={()=>setShowCleanup(false)}/>}

      {/* ① 種類選択 */}
      <div className="mb-4">
        <div className="text-xs font-semibold text-slate-500 mb-2">① 何を入力しますか？</div>
        <div className="grid grid-cols-2 gap-2">
          {Object.entries(HUB_TYPES).map(([k,v])=>(
            <button key={k} onClick={()=>pick(k)}
              className={cn('rounded-xl border px-3 py-2.5 text-sm font-medium text-left transition-colors',
                picked===k?'border-indigo-500 bg-indigo-50 text-indigo-700':'border-slate-200 bg-white text-slate-600')}>
              {v.label}
            </button>
          ))}
        </div>
      </div>

      {def && done===0 && (
        <>
          {/* ② プロンプト */}
          {picked!=='interview_os' && (
            <div className="mb-4 rounded-xl border border-indigo-200 bg-indigo-50 p-3 space-y-2">
              <div className="text-xs font-semibold text-indigo-700">② プロンプトをコピーしてチャッピーに渡す</div>
              <p className="text-xs text-slate-500">これをチャッピーに貼り、下に記録テキストを足してください。</p>
              <Btn variant="outline" size="sm" onClick={copyPrompt}>
                {promptCopied ? <><CheckIcon size={14}/> コピーしました</> : <><CopyIcon size={14}/> プロンプトをコピー</>}
              </Btn>
            </div>
          )}

          {/* ③ JSON貼り付け */}
          <div className="mb-4 space-y-2">
            <div className="text-xs font-semibold text-slate-500">③ 返ってきたJSONを貼り付け</div>
            <div className="flex gap-2">
              <input ref={fileRef} type="file" accept=".json" onChange={onFile} className="hidden"/>
              <Btn variant="outline" size="sm" onClick={()=>fileRef.current?.click()}>📁 ファイルを選択</Btn>
              {json && <span className="text-xs text-slate-400 self-center">{json.length.toLocaleString()}文字</span>}
            </div>
            <Txta label="" rows={7} value={json} onChange={e=>{setJson(e.target.value);setList(null);}}
              placeholder='[ { ... } ]'/>
            <Btn variant="outline" size="sm" onClick={doParse} disabled={!json.trim()}>内容を確認</Btn>
            {err && <ErrState error={err}/>}
          </div>

          {/* ④ 確認＆取り込み */}
          {list && (
            <div className="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 p-3 space-y-2">
              <div className="text-sm font-semibold text-emerald-800">{list.length}件を登録します（{def.label}）</div>
              <div className="max-h-40 overflow-y-auto space-y-0.5">
                {list.map((d,i)=>(
                  <div key={i} className="text-xs text-slate-600 truncate">
                    ・{d.title || d.name || d.mtg_topic || d.staff_name || d.scheduled_date || 'レコード'+(i+1)}
                  </div>
                ))}
              </div>
              {progress && <p className="text-xs text-indigo-500 text-center">{progress}件処理中...</p>}
              <Btn className="w-full" onClick={doImport} disabled={saving}>
                <SaveIcon size={14}/> {saving?'登録中...':list.length+'件を登録'}
              </Btn>
            </div>
          )}
        </>
      )}

      {done>0 && (
        <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-4 text-center space-y-2">
          <div className="text-2xl">✅</div>
          <div className="text-sm font-semibold text-emerald-800">{done}件を登録しました</div>
          <Btn variant="outline" size="sm" onClick={reset}>続けて入力する</Btn>
        </div>
      )}
    </>
  );
}


// ─── NEXUS CORE（核・聖域）──────────────────────────────────
// identity（自己認識）と genesis（創世記録）を保持する聖域。
// 普段は読み取り。意図して編集した時だけ書き換え、旧版を history へ残す。
function NexusCoreScreen() {
  const { sb, user } = useApp();
  const [identity, setIdentity] = useState(null);
  const [genesis, setGenesis] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null); // 編集中のレコード
  const [draft, setDraft] = useState('');
  const [reason, setReason] = useState('');
  const [saving, setSaving] = useState(false);
  const [showHistory, setShowHistory] = useState(null); // 履歴を見るcore_id
  const [history, setHistory] = useState([]);
  const [expanded, setExpanded] = useState({});

  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('nexus_core').select('*').eq('user_id', user.id)
      .order('core_type').order('sequence', { nullsFirst: true });
    const rows = data || [];
    setIdentity(rows.find(r => r.core_type === 'identity') || null);
    setGenesis(rows.filter(r => r.core_type === 'genesis').sort((a,b)=>(a.sequence||0)-(b.sequence||0)));
    setLoading(false);
  };
  useEffect(()=>{ load(); }, []);

  const startEdit = (rec) => { setEditing(rec); setDraft(rec.content); setReason(''); };
  const cancelEdit = () => { setEditing(null); setDraft(''); setReason(''); };

  const saveEdit = async () => {
    if (!editing || draft.trim() === editing.content.trim()) { cancelEdit(); return; }
    setSaving(true);
    // 旧版を history へ
    await sb.from('nexus_core_history').insert({
      user_id: user.id, core_id: editing.id, core_type: editing.core_type,
      title: editing.title, content: editing.content, sequence: editing.sequence,
      version: editing.version, reason: reason || null,
    });
    // 本体を更新（versionを上げる）
    await sb.from('nexus_core').update({
      content: draft, version: (editing.version||1) + 1, updated_at: new Date().toISOString(),
    }).eq('id', editing.id).eq('user_id', user.id);
    setSaving(false); cancelEdit(); load();
  };

  const openHistory = async (coreId) => {
    const { data } = await sb.from('nexus_core_history').select('*')
      .eq('user_id', user.id).eq('core_id', coreId).order('version', { ascending: false });
    setHistory(data || []); setShowHistory(coreId);
  };

  if (loading) return (<><PageHeader title="Nexusの核" subtitle="自己認識と創世の記録"/><LoadingState/></>);

  const empty = !identity && genesis.length === 0;

  return (
    <>
      <PageHeader title="Nexusの核" subtitle="自己認識と創世の記録 ── 聖域"/>

      {empty ? (
        <EmptyState message="核がまだ格納されていません" action={<p className="text-xs text-slate-400 mt-1">入力ハブの「Nexusの核」から取り込んでください</p>}/>
      ) : (
        <div className="space-y-6">
          {/* 自己認識 */}
          {identity && (
            <div className="rounded-2xl border-2 border-indigo-200 bg-gradient-to-b from-indigo-50/60 to-white p-5">
              <div className="mb-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="flex h-7 w-7 items-center justify-center rounded-lg bg-indigo-600 font-mono text-sm font-bold text-white">N</div>
                  <div>
                    <div className="text-sm font-semibold text-indigo-900">{identity.title}</div>
                    <div className="font-mono text-[10px] text-indigo-400">identity · version {identity.version}</div>
                  </div>
                </div>
                <div className="flex gap-1.5">

                  <button onClick={()=>startEdit(identity)} className="rounded-lg border border-indigo-200 px-2.5 py-1 text-[11px] text-indigo-600 hover:bg-indigo-50">編集</button>
                </div>
              </div>
              <p className="whitespace-pre-wrap text-[13px] leading-relaxed text-slate-800">{identity.content}</p>
            </div>
          )}

          {/* 創世記録 */}
          {genesis.length > 0 && (
            <div>
              <div className="mb-2 px-1 text-xs font-semibold text-slate-500">創世の記録 ── Nexusの生まれた対話（{genesis.length}）</div>
              <div className="space-y-2">
                {genesis.map(g => {
                  const isOpen = expanded[g.id];
                  return (
                    <div key={g.id} className="rounded-xl border border-slate-200 bg-white overflow-hidden">
                      <button onClick={()=>setExpanded(e=>({...e,[g.id]:!e[g.id]}))}
                        className="flex w-full items-center justify-between px-4 py-3 text-left">
                        <span className="text-sm font-medium text-slate-700">{g.title}</span>
                        <span className="text-slate-400 text-xs">{isOpen?'−':'+'}</span>

                      {isOpen && (
                        <div className="px-4 pb-4">
                          <p className="whitespace-pre-wrap text-[13px] leading-relaxed text-slate-600">{g.content}</p>
                          <div className="mt-2 flex gap-1.5">
                            <button onClick={()=>openHistory(g.id)} className="rounded-lg border border-slate-200 px-2.5 py-1 text-[11px] text-slate-500 hover:bg-slate-50">履歴 (v{g.version})</button>
                            <button onClick={()=>startEdit(g)} className="rounded-lg border border-slate-200 px-2.5 py-1 text-[11px] text-slate-500 hover:bg-slate-50">編集</button>
                          </div>
                        </div>
                      )}

                  );
                })}
              </div>
            </div>
          )}

          <p className="px-1 text-center text-[11px] text-slate-400">成長しないものは、生きていない。</p>
        </div>
      )}

      {/* 編集モーダル */}
      {editing && (
        <FullModal title={'核の編集 ── '+editing.title} onClose={cancelEdit} onSave={saveEdit} saveLabel="新バージョンとして保存" saving={saving}>
          <div className="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-[11px] text-amber-700">
            核を書き換えると、現在の内容（version {editing.version}）は履歴として残ります。定義が変わった時だけ書き換えてください。
          </div>
          <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={14}
            className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-[13px] leading-relaxed focus:outline-none"/>
          <input value={reason} onChange={e=>setReason(e.target.value)}
            placeholder="なぜ変えるのか（任意・履歴に残ります）"
            className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none"/>
        </FullModal>
      )}

      {/* 履歴モーダル */}
      {showHistory && (
        <FullModal title="変更履歴 ── 脱皮した皮" onClose={()=>setShowHistory(null)}>
          {history.length === 0 ? (
            <p className="text-xs text-slate-400">まだ変更履歴はありません。これが最初のバージョンです。</p>
          ) : (
            <div className="space-y-3">
              {history.map(h => (
                <div key={h.id} className="rounded-xl border border-slate-200 bg-slate-50 p-3">
                  <div className="mb-1 flex items-center justify-between">
                    <span className="font-mono text-[10px] text-slate-400">version {h.version}</span>

                  <p className="whitespace-pre-wrap text-[12px] leading-relaxed text-slate-600">{h.content}</p>
                </div>
              ))}
            </div>
          )}
        </FullModal>
      )}
    </>
  );
}


// ─── LOG SCREEN（教育・面談・MTG一覧）──────────────────────
function LogScreen() {
  const { sb, user, store, fetchTable } = useApp();
  const [tab, setTab] = useState('education'); // education | interview | meeting
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [topics, setTopics] = useState([]);
  const [filterStaff, setFilterStaff] = useState('');
  const [filterTopic, setFilterTopic] = useState('');
  const [filterParticipant, setFilterParticipant] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [showTopicMgr, setShowTopicMgr] = useState(false);

  const loadTopics = async () => {
    const { data } = await sb.from('mtg_topics').select('*').eq('user_id', user.id).order('sort_order').order('name');
    setTopics(data||[]);
  };
  const load = async () => {
    setLoading(true);
    const { data } = await sb.from('knowledge_items').select('*').eq('user_id', user.id)
      .eq('category', tab).order('created_at', { ascending: false });
    setLogs(data||[]);
    setLoading(false);
  };
  useEffect(()=>{ load(); }, [tab]);
  useEffect(()=>{ loadTopics(); }, []);

  // 実施日を抽出
  const getActualDate = (item) => {
    const c = item.content || '';
    const lines = c.split('\n');
    for (let i=0;i<lines.length;i++){
      if (lines[i].includes('■ 実施日')) return (lines[i+1]||'').trim();
      if (lines[i].includes('■ 対象月')) return (lines[i+1]||'').trim();
      if (lines[i].startsWith('【Capture Raw】実施日：')) return lines[i].split('実施日：')[1]?.slice(0,10);
    }
    return (item.created_at||'').slice(0,10);
  };

  // フィルタ適用
  const filtered = useMemo(()=>{
    let arr = logs;
    if (tab !== 'meeting' && filterStaff) {
      const sname = store.staff.find(s=>s.id===filterStaff)?.name;
      arr = arr.filter(l => l.staff_id === filterStaff || (sname && (l.content||'').includes(sname)));
    }
    if (tab === 'meeting' && filterTopic) arr = arr.filter(l => l.mtg_topic === filterTopic);
    if (tab === 'meeting' && filterParticipant) arr = arr.filter(l => (l.participants||'').includes(filterParticipant));
    return arr;
  }, [logs, tab, filterStaff, filterTopic, filterParticipant, store.staff]);

  const getField = (c, label) => {
    const lines = (c||'').split('\n');
    for(let i=0;i<lines.length;i++){ if(lines[i].includes('■ '+label)) return (lines[i+1]||'').trim(); }
    return null;
  };

  const TABS = [
    { k:'education', l:'📚 教育' },
    { k:'interview', l:'💬 面談' },
    { k:'meeting', l:'🤝 MTG' },
    { k:'performance', l:'📊 実績' },
  ];

  return (
    <>
      <PageHeader title="記録ログ" subtitle="教育・面談・MTG"
        action={<Btn size="sm" onClick={()=>setShowForm(true)}><PlusIcon size={14}/> 追加</Btn>}/>

      <div className="mb-4 flex rounded-xl border border-slate-200 bg-slate-50 p-1 gap-1">
        {TABS.map(({k,l})=>(
          <button key={k} onClick={()=>{setTab(k);setFilterStaff('');setFilterTopic('');setFilterParticipant('');}}
            className={cn('flex-1 rounded-lg py-2 text-xs font-medium transition-colors',
              tab===k?'bg-white text-indigo-700 shadow-sm':'text-slate-500')}>{l}</button>
        ))}
      </div>

      {/* フィルタ */}
      {tab !== 'meeting' ? (
        <div className="mb-3">
          <select value={filterStaff} onChange={e=>setFilterStaff(e.target.value)}
            className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none">
            <option value="">全スタッフ</option>
            {store.staff.filter(s=>s.is_active).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
      ) : (
        <div className="mb-3 space-y-2">
          <div className="flex gap-2">
            <select value={filterTopic} onChange={e=>setFilterTopic(e.target.value)}
              className="flex-1 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none">
              <option value="">全題材</option>
              {topics.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
            </select>
            <Btn variant="outline" size="sm" onClick={()=>setShowTopicMgr(true)}>題材管理</Btn>
          </div>
          <input value={filterParticipant} onChange={e=>setFilterParticipant(e.target.value)}
            placeholder="参加者で絞り込み（名前の一部）"
            className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none"/>
        </div>
      )}

      {loading ? <LoadingState/> : (
        filtered.length === 0
          ? <EmptyState message="記録がありません" action={<Btn size="sm" variant="secondary" onClick={()=>setShowForm(true)}>記録を追加</Btn>}/>
          : (
            <div className="space-y-2">
              {filtered.map(log => {
                const isPerf = tab==='performance';
                const what = isPerf
                  ? '合計 ' + (getField(log.content,'合計')||'-') + (getField(log.content,'端末比率') ? '（端末比率 '+getField(log.content,'端末比率')+'）' : '')
                  : getField(log.content, tab==='education'?'何をした':tab==='interview'?'何を話した':'議題');
                const why = isPerf ? ('目標 ' + (getField(log.content,'目標')||'-')) : (getField(log.content, 'なぜ') || getField(log.content, '決定事項'));
                const next = isPerf ? null : (getField(log.content, '次どうする') || getField(log.content, '宿題'));
                const relParts = log.content && log.content.includes('■ 関連資料') ? log.content.split('■ 関連資料') : null;
                const related = relParts ? (relParts[1]||'').replace(/^\s+/,'').trim() || null : null;
                return (
                  <LogAccordion key={log.id}
                    date={getActualDate(log)}
                    what={what || log.title}
                    why={why} next={next} risk={null} related={related}
                    urgent={log.tags?.includes('urgent')}
                    fullContent={log.content}
                    logId={log.id}
                    staffId={log.staff_id}
                    category={tab}
                    subtitle={tab==='meeting' ? [log.mtg_topic, log.participants].filter(Boolean).join(' / ') : null}
                    onUpdated={load}
                  />
                );
              })}
            </div>
          )
      )}

      {showForm && <LogForm category={tab} topics={topics} onClose={()=>setShowForm(false)}
        onSaved={()=>{setShowForm(false);load();fetchTable('staff');}} onTopicAdded={loadTopics}/>}
      {showTopicMgr && <MtgTopicManager topics={topics} onClose={()=>setShowTopicMgr(false)} onChanged={loadTopics}/>}
    </>
  );
}

// ─── LOG FORM ─────────────────────────────────────────────
function LogForm({ category, topics, onClose, onSaved, onTopicAdded }) {
  const { sb, user, store } = useApp();
  const [date, setDate] = useState(localIso());
  const [staffId, setStaffId] = useState('');
  const [topic, setTopic] = useState('');
  const [participants, setParticipants] = useState('');
  const [what, setWhat] = useState('');
  const [why, setWhy] = useState('');
  const [next, setNext] = useState('');
  const [related, setRelated] = useState('');
  const [urgent, setUrgent] = useState(false);
  const [saving, setSaving] = useState(false);

  const isMtg = category === 'meeting';
  const typeLabel = category==='education'?'教育ログ':category==='interview'?'面談ログ':'MTGログ';
  const whatLabel = category==='education'?'何をした':category==='interview'?'何を話した':'議題';
  const whyLabel = isMtg?'決定事項':'なぜ';
  const nextLabel = isMtg?'宿題・次のアクション':'次どうする';

  const save = async () => {
    if (!what.trim()) return;
    setSaving(true);
    const staffName = staffId ? store.staff.find(s=>s.id===staffId)?.name : '';
    const lines = ['【'+typeLabel+'】','','■ 実施日',date,''];
    if (isMtg) {
      lines.push('■ 題材', topic, '', '■ 参加者', participants, '');
    } else {
      lines.push('■ 誰に', staffName||'', '');
    }
    lines.push('■ '+whatLabel, what, '', '■ '+whyLabel, why, '', '■ '+nextLabel, next);
    if (related.trim()) lines.push('', '─────────────────', '■ 関連資料', related.trim());

    const { data: ins } = await sb.from('knowledge_items').insert({
      user_id: user.id,
      title: (isMtg ? (topic?topic+' ':'') : (staffName?staffName+' ':'')) + what.slice(0,40),
      category, content: lines.join('\n'),
      tags: ['capture', category, ...(urgent?['urgent']:[])],
      source_ref: '記録ログ',
      staff_id: staffId || null,
      mtg_topic: isMtg ? (topic||null) : null,
      participants: isMtg ? (participants||null) : null,
    }).select('id').single();
    // MTG参加者を各スタッフに紐づけ
    if (isMtg && participants && ins) {
      let pstr = participants;
      ['、',',','/','／',' '].forEach(sep=>{ pstr = pstr.split(sep).join('・'); });
      const names = pstr.split('・').map(s=>s.trim()).filter(Boolean);
      for (const nm of names) {
        const hit = (store.staff||[]).find(s => nm.includes(s.name) || s.name.includes(nm));
        if (hit) await sb.from('mtg_participants').insert({ user_id:user.id, knowledge_id:ins.id, staff_id:hit.id });
      }
    }
    // スタッフ最終日更新
    if (staffId && !urgent) {
      const field = category==='education'?'last_education_at':category==='interview'?'last_interview_at':null;
      if (field) await sb.from('staff_profiles').update({ [field]: date }).eq('id', staffId).eq('user_id', user.id);
    }
    setSaving(false); onSaved();
  };

  return (
    <FullModal title={typeLabel+'を追加'} onClose={onClose} onSave={save} saving={saving}>
      <Inp label="実施日" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
      {isMtg ? (
        <>
          <Sel label="題材" value={topic} onChange={e=>setTopic(e.target.value)}>
            <option value="">選択してください</option>
            {topics.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
          </Sel>
          <Inp label="参加者" value={participants} onChange={e=>setParticipants(e.target.value)} placeholder="本橋・佐藤・岩間"/>
        </>
      ) : (
        <Sel label="対象スタッフ" value={staffId} onChange={e=>setStaffId(e.target.value)}>
          <option value="">選択してください</option>
          {store.staff.filter(s=>s.is_active).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </Sel>
      )}
      <Txta label={whatLabel} rows={2} value={what} onChange={e=>setWhat(e.target.value)}/>
      <Txta label={whyLabel} rows={2} value={why} onChange={e=>setWhy(e.target.value)}/>
      <Txta label={nextLabel} rows={2} value={next} onChange={e=>setNext(e.target.value)}/>
      <Txta label="関連資料・議事録（任意）" rows={4} value={related} onChange={e=>setRelated(e.target.value)} placeholder="議事録の全文を貼り付け"/>
      {!isMtg && (
        <label className="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
          <input type="checkbox" checked={urgent} onChange={e=>setUrgent(e.target.checked)} className="h-4 w-4 rounded border-slate-300"/>
          緊急対応（フォロー間隔を更新しない）
        </label>
      )}
    </FullModal>
  );
}

// ─── MTG TOPIC MANAGER ────────────────────────────────────
function MtgTopicManager({ topics, onClose, onChanged }) {
  const { sb, user } = useApp();
  const [name, setName] = useState('');
  const [adding, setAdding] = useState(false);

  const add = async () => {
    if (!name.trim()) return;
    setAdding(true);
    await sb.from('mtg_topics').insert({ user_id: user.id, name: name.trim(), sort_order: topics.length });
    setName(''); setAdding(false); onChanged();
  };
  const del = async (id) => {
    if (!confirm('この題材を削除しますか？（記録自体は残ります）')) return;
    await sb.from('mtg_topics').delete().eq('id', id).eq('user_id', user.id);
    onChanged();
  };

  return (
    <FullModal title="MTG題材の管理" onClose={onClose}>
      <p className="text-xs text-slate-500">ビッグ清田・アークス菊水・全体・責任者 などの題材を登録します。</p>
      <div className="flex gap-2">
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="新しい題材名"
          className="flex-1 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none"/>
        <Btn size="sm" onClick={add} disabled={adding||!name.trim()}><PlusIcon size={14}/></Btn>
      </div>
      <div className="space-y-1">
        {topics.map(t=>(
          <div key={t.id} className="flex items-center justify-between rounded-lg border border-slate-200 bg-white px-3 py-2">
            <span className="text-sm text-slate-700">{t.name}</span>
            <button onClick={()=>del(t.id)} className="text-rose-400 hover:text-rose-600"><TrashIcon size={14}/></button>
          </div>
        ))}
        {topics.length===0 && <p className="text-xs text-slate-400 text-center py-3">題材がまだありません</p>}
      </div>
    </FullModal>
  );
}

    r.readAsText(file);
  };

  const [mode, setMode] = useState(''); // 'batch' | 'direct'

  const doParse = () => {
    setErr('');
    try {
      const cleaned = cleanJsonInput(json);
      const data = JSON.parse(cleaned);
      const arr = Array.isArray(data) ? data : [data];
      // フォーマット自動判別
      if (arr.length > 0 && arr[0].date) {
        // バッチ形式 {date, staff_name, category, title, related_doc}
        const valid = arr.filter(d => d && d.date);
        setMode('batch'); setList(valid);
      } else if (arr.length > 0 && arr[0].title && arr[0].content) {
        // ナレッジ直接形式 {title, category, content, tags}
        setMode('direct'); setList(arr.filter(d => d && d.title));
      } else {
        setErr('対応するフォーマットが見つかりませんでした。dateフィールド or title+contentフィールドが必要です。');
      }
    } catch(e) { setErr('JSONとして読み取れませんでした。'); }
  };

  const doImport = async () => {
    if (!list) return;
    setSaving(true);
    const staffMap = {};
    (store.staff || []).forEach(s => { staffMap[s.name] = s.id; });

    if (mode === 'direct') {
      // ナレッジ直接形式：そのまま挿入
      const VALID_CATS = ['general','education','interview','meeting','workflow','skill_memo','client','market','template','other'];
      const rows = list.map(d => ({
        user_id: user.id,
        title: d.title || '',
        category: VALID_CATS.includes(d.category) ? d.category : 'general',
        content: d.content || '',
        tags: Array.isArray(d.tags) ? d.tags : (d.tags ? [d.tags] : ['capture']),
        source_ref: d.source_ref || 'バッチインポート',
        staff_id: d.staff_id || null,
      }));
      for (let i = 0; i < rows.length; i++) {
        setProgress((i+1) + ' / ' + rows.length + ' 件処理中...');
        await sb.from('knowledge_items').insert(rows[i]);
      }
    } else {
      // バッチ形式：スタッフ名解決＋content組み立て
      for (let i = 0; i < list.length; i++) {
        const d = list[i];
        setProgress((i+1) + ' / ' + list.length + ' 件処理中...');
        let staffId = null;
        if (d.staff_name) {
          for (const [name, id] of Object.entries(staffMap)) {
            if (d.staff_name.includes(name) || name.includes(d.staff_name)) { staffId = id; break; }
          }
        }
        const catMap = { education:'education', interview:'interview', meeting:'meeting', other:'general', '教育':'education', '面談':'interview', '打ち合わせ':'meeting', 'MTG':'meeting' };
        const cat = catMap[d.category] || 'general';

        if (d.related_doc) contentLines.push('', '─────────────────', '■ 関連資料', d.related_doc);
        await sb.from('knowledge_items').insert({
          user_id: user.id,
          title: (d.staff_name ? d.staff_name + ' ' : '') + (d.title || '').slice(0, 40),
          category: cat, content: contentLines.join('\n'),
          tags: ['capture', cat], source_ref: 'バッチインポート', staff_id: staffId,
        });
      }
    }
    await fetchTable('knowledge');
    setProgress('');
    setSaving(false);
    setDone(true);
  };

  return (
    <FullModal title="記録バッチインポート" onClose={onClose}
      onSave={list && !done ? doImport : null}

      {!done ? (
        <>
          {/* チャッピーへの指示文 */}
          <div className="rounded-xl border border-indigo-200 bg-indigo-50 p-3 space-y-2">
            <div className="text-xs font-semibold text-indigo-700">① チャッピーへのプロンプトをコピー</div>
            <p className="text-xs text-slate-500">このプロンプトをチャッピーに貼り、その後に記録テキストを追加してください。</p>
            <Btn variant="outline" size="sm" onClick={copyPrompt}>
              {promptCopied ? <><CheckIcon size={14}/> コピーしました</> : <><CopyIcon size={14}/> プロンプトをコピー</>}
            </Btn>
            <button onClick={()=>setShowPrompt(v=>!v)} className="text-xs text-indigo-500 underline">
              {showPrompt ? '▲ 閉じる' : '▼ 内容を確認する'}
            </button>
            {showPrompt && (
              <pre className="whitespace-pre-wrap font-mono text-[10px] text-slate-600 bg-white rounded-lg p-2 border border-slate-200 max-h-48 overflow-y-auto">{PROMPT_TEXT}</pre>

          <div className="text-xs font-semibold text-slate-600">② JSONを貼り付け or ファイル選択</div>

          <Btn variant="outline" size="sm" onClick={doParse} disabled={!json.trim()}>内容を確認</Btn>

function parseCapture(item) {
  // knowledge_items のcontent文字列からフィールドを抽出
  const c = item.content || '';
  const get = (labels) => {
    for (const lbl of labels) {
      const m = c.match(new RegExp('■ ' + lbl + '\\n([\\s\\S]*?)(?=\\n■ |\\n─|$)'));
      if (m) return m[1].trim();
    }
    return '';
  };
  const typeMap = { education:'教育', interview:'面談', decision:'判断', plan:'企画', general:'その他' };
  const typeKey = (item.tags||[]).find(t=>['education','interview','decision','plan'].includes(t)) || item.category || 'general';
  return {
    date: (item.created_at||'').slice(0,10),
    type: typeKey,
    who:  get(['誰に','誰と']),
    what: get(['何をした','何を話した','何を決めた','何を考えた']),
    why:  get(['なぜそうした','なぜその話をした','なぜそう決めた','なぜやる','なぜ']),
    risk: get(['リスク']) || undefined,
    effect: get(['期待効果']) || undefined,
    next: get(['次どうする']),
    urgent: (item.tags||[]).includes('urgent'),
  };
}

    const { data } = await sb.from('knowledge_items')
      .select('*').eq('user_id', user.id)
      .contains('tags', ['capture'])
      .gte('created_at', from.toISOString())
      .order('created_at', { ascending: false });
    setItems(data||[]);
    setLoading(false);
  };
  const loadAll = async () => {
    setLoading(true);
    const { data } = await sb.from('knowledge_items')
      .select('*').eq('user_id', user.id)
      .contains('tags', ['capture'])
      .order('created_at', { ascending: false });
    setItems(data||[]);
    setLoading(false);

  const staffById = useMemo(()=>{

  // チャッピー用（日付修正向け）

        type: p.type,

        why: p.why||'',

    });
    return records;
  }, [items, staffById]);

  // チャッピーへ渡すプロンプト付きテキスト（文字列結合で複数行テンプレート回避）

    '- 出力はJSONのみ（説明文不要）',
    '- idフィールドは必ず保持する',
    '',
  ].join('\n');

  const json = instruction + JSON.stringify(fullJson, null, 2);

  const copy = async () => {
    try { await navigator.clipboard.writeText(json); setCopied(true); setTimeout(()=>setCopied(false),2000); } catch(e){}
  };

  return (
    <FullModal title="Captureエクスポート" onClose={onClose}>
      <p className="text-xs text-slate-500 leading-relaxed">
        日付修正用JSONです。チャッピーに渡してdateを修正してもらい、ナレッジのJSONインポートで上書き登録できます。

const CAPTURE_EXTRACT_PROMPT = (raw) => `以下のメモから情報を抽出し、ログタイプに分類してください。

## メモ
${raw}

## 出力ルール
- typeはeducation/interview/decision/planのどれか1つ
- whoは対象者（面談・教育の場合。なければ空文字）
- whatは何をした・何を話した・何を決めた・何を考えた
- whyはなぜそうしたか（最重要。必ず埋めること）
- riskはリスク（判断の場合のみ。それ以外は空文字）
- effectは期待効果（企画の場合のみ。それ以外は空文字）
- nextは次どうする

説明なしで以下のJSONのみ出力してください：
{
  "type": "education",
  "who": "",
  "what": "",
  "why": "",
  "risk": "",
  "effect": "",
  "next": ""
}`;

const CAPTURE_TYPE_LABELS = {
  education: '📚 教育ログ',
  interview: '💬 面談ログ',
  decision:  '⚖️ 判断ログ',
  plan:      '💡 企画ログ',
};

function buildCaptureContent(p) {
  const type = CAPTURE_TYPE_LABELS[p.type] || p.type;
  const rows = [];
  if (p.who)    rows.push(`■ 誰に\n${p.who}`);
  if (p.what)   rows.push(`■ ${p.type==='decision'?'何を決めた':p.type==='plan'?'何を考えた':'何をした'}\n${p.what}`);
  if (p.why)    rows.push(`■ なぜ\n${p.why}`);
  if (p.risk)   rows.push(`■ リスク\n${p.risk}`);
  if (p.effect) rows.push(`■ 期待効果\n${p.effect}`);
  if (p.next)   rows.push(`■ 次どうする\n${p.next}`);
  return `【${type}】\n\n${rows.join('\n\n')}`;
}

  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [step, setStep] = useState(1); // 1:input 2:bridge 3:preview
  const [relatedDoc, setRelatedDoc] = useState('');
  const [showExport, setShowExport] = useState(false);
  const [showBatchImport, setShowBatchImport] = useState(false);
  const [actualDate, setActualDate] = useState(() => localIso());
  const [isUrgent, setIsUrgent] = useState(false);
  const [linkedStaffId, setLinkedStaffId] = useState(null);
  const [quickCategory, setQuickCategory] = useState('education');

  const generate = () => {
    if (!raw.trim()) return;
    setPrompt(CAPTURE_EXTRACT_PROMPT(raw));
    setStep(2);
    setParsed(null); setParseErr(''); setReply(''); setSaved(false);
  };

  const copy = async () => {
    try { await navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch(e) {}
  };

  const doParse = () => {
    setParseErr('');
    try {
      const cleaned = cleanJsonInput(reply);
      const obj = JSON.parse(cleaned);
      if (!obj || !obj.type) { setParseErr('typeが見つかりません。JSONのみ貼り付けてください。'); return; }
      setParsed(obj);
      setStep(3);
      // 「誰に」フィールドからスタッフを自動マッチ
      if (obj.who && store?.staff) {
        const hit = store.staff.find(s => obj.who.includes(s.name) || s.name.includes(obj.who.trim()));

      setParseErr('JSONとして読み取れませんでした。Claudeの回答のJSON部分だけを貼り付けてください。');
    }
  };

  const save = async (useStructured = true) => {

    let title, categoryVal, contentVal, tagsVal;

      title = [parsed.who, parsed.what].filter(Boolean).join('：').slice(0, 40) || raw.slice(0, 30);

      tagsVal = ['capture', 'raw_log', parsed.type || '', ...(isUrgent?['urgent']:[])];
    } else {
      title = raw.slice(0, 40);

function buildMonthlyReviewPrompt(opps, skills, month) {
  const applied = opps.filter(o=>!['candidate','analyzing'].includes(o.status)).length;
  const orders = opps.filter(o=>['won','in_progress','awaiting_delivery','delivered','done','revision'].includes(o.status)).length;
  const revenue = opps.filter(o=>['delivered','done'].includes(o.status)).reduce((s,o)=>s+o.reward_amount,0);
  const active = opps.filter(o=>['won','in_progress','awaiting_delivery','revision'].includes(o.status));
  const winRate = applied>0 ? Math.round(orders/applied*100) : 0;
  const oppList = opps.slice(0,10).map(o=>`- ${o.title}（${STATUS_META[o.status]?.label||o.status}・${fmtYen(o.reward_amount)}）`).join('\n') || '（なし）';
  const skillList = skills.slice(0,5).map(s=>`- ${s.name}（使用${s.usage_count||0}回）`).join('\n') || '（未登録）';
  return `# 月次レビュー依頼（${month.replace('-','年')}月）\n\n## 今月の数字\n- 案件総数: ${opps.length}件\n- 応募: ${applied}件 / 受注: ${orders}件 / 受注率: ${winRate}%\n- 完了売上: ${fmtYen(revenue)}\n- 稼働中: ${active.length}件\n\n## 直近の案件一覧\n${oppList}\n\n## よく使うSkill（上位5）\n${skillList}\n\n## 依頼内容\n上記データをもとに以下の構成で月次振り返りレポートを作成してください。\n\n### 1. 今月の成果（数字と具体的な案件）\n### 2. 良かった点・再現したいこと\n### 3. 課題・改善点\n### 4. 来月の目標と行動計画（具体的な数字で）\n### 5. Skill・ナレッジで強化すべき点\n\n「本橋さん自身の言葉で振り返った」ような文体で、Nexusのナレッジとして保存できる形式でお願いします。`;
}
function MonthlyReviewBridge({ opps, skills }) {
  const { sb, user } = useApp();
  const now = new Date();
  const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
