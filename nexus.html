    try { await navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch(e) {}
  };

  const doParse = () => {
    setParseErr('');
    try {
      const cleaned = cleanJsonInput(reply);
      const obj = JSON.parse(cleaned);
      if (!obj || !obj.type) { setParseErr('typeが見つかりません。JSONのみ貼り付けてください。'); return; }
      setParsed(obj);
      setStep(3);
    } catch(e) {
      setParseErr('JSONとして読み取れませんでした。Claudeの回答のJSON部分だけを貼り付けてください。');
    }
  };

  const save = async (useStructured = true) => {
    setSaving(true);
    let title, categoryVal, contentVal, tagsVal;
    if (useStructured && parsed) {
      title = [parsed.who, parsed.what].filter(Boolean).join('：').slice(0, 40) || raw.slice(0, 30);
      categoryVal = parsed.type || 'general';
      contentVal = buildCaptureContent(parsed) + (relatedDoc.trim() ? `\n\n─────────────────\n■ 関連資料\n${relatedDoc.trim()}` : '');
      tagsVal = ['capture', 'raw_log', parsed.type || '', ...(isUrgent?['urgent']:[])];
    } else {
      title = raw.slice(0, 40);
      categoryVal = 'general';
      contentVal = `【Capture Raw】\n\n${raw}` + (relatedDoc.trim() ? `\n\n─────────────────\n■ 関連資料\n${relatedDoc.trim()}` : '');
      tagsVal = ['capture', 'raw_log', ...(isUrgent?['urgent']:[])];
    }
    await sb.from('knowledge_items').insert({
      user_id: user.id, title, category: categoryVal,
      content: contentVal, tags: tagsVal, source_ref: 'Nexus Capture',
    });
    // 誰に・誰とが一致するスタッフの日付を自動更新（緊急の場合はスキップ）
    const whoVal = useStructured && parsed ? (parsed.who || '') : '';
    if (whoVal.trim() && !isUrgent) {
      const field = (categoryVal === 'education') ? 'last_education_at' : categoryVal === 'interview' ? 'last_interview_at' : null;
      if (field) {
        const { data: matched } = await sb.from('staff_profiles').select('id,name').eq('user_id', user.id);
        if (matched) {
          const hit = matched.find(s => whoVal.includes(s.name) || s.name.includes(whoVal.trim()));
          if (hit) await sb.from('staff_profiles').update({ [field]: actualDate }).eq('id', hit.id).eq('user_id', user.id);
        }
      }
    }
    fetchTable('knowledge'); fetchTable('staff');
    setSaving(false); setSaved(true);
    setRaw(''); setPrompt(''); setReply(''); setParsed(null); setStep(1); setRelatedDoc('');
    setActualDate(localIso()); setIsUrgent(false);
  };

  return (
    <>
      <PageHeader title="Capture" subtitle="話す→AIが構造化→保存" onBack={back}
        action={<Btn variant="outline" size="sm" onClick={()=>setShowExport(true)}>📋 JSON</Btn>}/>

      {/* STEP 1: 入力 */}
      <div className="mb-3 flex items-center justify-between">
        <label className="text-sm font-semibold text-slate-700">🎤 自由に入力する</label>
        <label className={cn('flex items-center gap-1.5 rounded-full px-3 py-1.5 text-xs font-medium cursor-pointer border transition-colors',
          isUrgent ? 'bg-rose-50 border-rose-300 text-rose-600' : 'bg-slate-50 border-slate-200 text-slate-500')}>
          <input type="checkbox" checked={isUrgent} onChange={e=>setIsUrgent(e.target.checked)} className="h-3.5 w-3.5"/>
          緊急対応
        </label>
      </div>
      {isUrgent && <p className="mb-2 text-xs text-rose-500 bg-rose-50 rounded-lg px-3 py-2">⚠️ フォロー間隔は更新されません</p>}
      <div className="mb-4">
        <p className="mb-2 text-xs text-slate-400">
          何があったかを30秒で書くだけ。構造化はAIが担当する。
        </p>
        <textarea
          value={raw}
          onChange={e => { setRaw(e.target.value); setStep(1); setSaved(false); }}
          rows={6}
          placeholder={`例：\n黒田くん\n再現性教育を実施した\n成功体験はあるが再現できていないため\n次回は応用編へ進む`}
          className="w-full rounded-xl border-2 border-indigo-200 bg-white p-4 text-sm leading-relaxed text-slate-800 placeholder:text-slate-300 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-100"
        />
      </div>

      {/* 関連資料（任意） */}
      <div className="mb-4">
        <label className="mb-1.5 block text-sm font-medium text-slate-600">
          📎 関連資料（任意）
        </label>
        <p className="mb-1.5 text-xs text-slate-400">教育共有文・面談共有文・文字起こし・企画書などをそのまま貼り付け</p>
        <textarea
          value={relatedDoc}
          onChange={e => setRelatedDoc(e.target.value)}
          rows={4}
          placeholder="教育共有文・面談共有文・文字起こしなどを貼り付け（なければ空欄でOK）"
          className="w-full rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm leading-relaxed text-slate-800 placeholder:text-slate-300 focus:border-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-100"
        />
      </div>

      {/* アクション */}
      {raw.trim() && step === 1 && (
        <div className="mb-4 flex gap-2">
          <Btn className="flex-1" onClick={generate}>
            <WandIcon size={14}/> AIで構造化する
          </Btn>
          <Btn variant="secondary" onClick={() => save(false)} disabled={saving}>
            そのまま保存
          </Btn>
        </div>
      )}

      {/* STEP 2: Bridge */}
      {step >= 2 && prompt && (
        <div className="mb-4 rounded-xl border border-slate-200 bg-white p-4 space-y-3">
          <div className="text-xs font-semibold text-slate-500">① Claudeに渡すプロンプト</div>
          <textarea readOnly value={prompt} rows={6}
            className="w-full rounded-lg border border-slate-100 bg-slate-50 p-3 font-mono text-xs leading-relaxed"/>
          <div className="flex justify-end">
            <Btn variant="secondary" size="sm" onClick={copy}>
              {copied ? <><CheckIcon size={14}/> コピー済み</> : <><CopyIcon size={14}/> Claudeにコピー</>}
            </Btn>
          </div>
          <div className="text-xs font-semibold text-slate-500">② Claudeの回答（JSON）を貼り付け</div>
          <textarea value={reply} onChange={e => { setReply(e.target.value); setParsed(null); setParseErr(''); }}
            rows={4} placeholder='{ "type": "education", "who": "黒田くん", ... }'
            className="w-full rounded-lg border border-slate-200 bg-white p-3 font-mono text-xs leading-relaxed"/>
          {parseErr && <ErrState error={parseErr}/>}
          <Btn variant="outline" size="sm" onClick={doParse} disabled={!reply.trim()}>
            構造を確認する
          </Btn>
        </div>
      )}

      {/* STEP 3: Preview + Save */}
      {step === 3 && parsed && (
        <div className="mb-4 rounded-xl border border-indigo-200 bg-indigo-50 p-4 space-y-3">
          <div className="text-xs font-semibold text-indigo-600">
            {CAPTURE_TYPE_LABELS[parsed.type] || parsed.type} として保存します
          </div>
          {[
            { label: '誰に', value: parsed.who },
            { label: '何をした', value: parsed.what },
            { label: '★なぜ', value: parsed.why, highlight: true },
            { label: 'リスク', value: parsed.risk },
            { label: '期待効果', value: parsed.effect },
            { label: '次どうする', value: parsed.next },
          ].filter(r => r.value).map(r => (
            <div key={r.label}>
              <div className={cn('text-xs font-medium', r.highlight ? 'text-indigo-600' : 'text-slate-400')}>{r.label}</div>
              <div className="text-sm text-slate-800">{r.value}</div>
            </div>
          ))}
          {/* 実施日・緊急フラグ */}
          {(parsed.type === 'education' || parsed.type === 'interview') && (
            <div className="rounded-lg border border-slate-200 bg-slate-50 p-3 space-y-2">
              <div className="flex items-center gap-3">
                <label className="text-xs font-medium text-slate-600 shrink-0">実施日</label>
                <input type="date" value={actualDate} onChange={e=>setActualDate(e.target.value)}
                  className="flex-1 rounded-lg border border-slate-200 bg-white px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400"/>
              </div>
              <label className="flex items-center gap-2 text-xs text-slate-600 cursor-pointer">
                <input type="checkbox" checked={isUrgent} onChange={e=>setIsUrgent(e.target.checked)}
                  className="h-4 w-4 rounded border-slate-300 text-rose-500"/>
                <span>緊急対応（定期フォローの日程を変えない）</span>
              </label>
              {isUrgent && <p className="text-xs text-rose-500">⚠️ 記録は保存されますが、フォロー間隔は更新されません</p>}
            </div>
          )}
          {relatedDoc.trim() && (
            <div>
              <div className="text-xs font-medium text-slate-400">関連資料</div>
              <div className="text-xs text-slate-600 line-clamp-2">{relatedDoc.slice(0, 80)}…</div>
            </div>
          )}
          {saved && <span className="block text-sm text-emerald-600">保存しました ✓</span>}
          <Btn className="w-full" onClick={() => save(true)} disabled={saving}>
            <SaveIcon size={14}/> {saving ? '保存中…' : 'Raw Logsに保存'}
          </Btn>
        </div>
      )}

      {saved && step === 1 && (
        <p className="text-center text-sm text-emerald-600 py-4">保存しました ✓</p>
      )}
      {showExport && <CaptureExport onClose={()=>setShowExport(false)}/>}
    </>
  );
}

// ─── MONTHLY REVIEW BRIDGE ────────────────────────────────
function buildMonthlyReviewPrompt(opps, skills, month) {
  const applied = opps.filter(o=>!['candidate','analyzing'].includes(o.status)).length;
  const orders = opps.filter(o=>['won','in_progress','awaiting_delivery','delivered','done','revision'].includes(o.status)).length;
  const revenue = opps.filter(o=>['delivered','done'].includes(o.status)).reduce((s,o)=>s+o.reward_amount,0);
  const active = opps.filter(o=>['won','in_progress','awaiting_delivery','revision'].includes(o.status));
  const winRate = applied>0 ? Math.round(orders/applied*100) : 0;
  const oppList = opps.slice(0,10).map(o=>`- ${o.title}（${STATUS_META[o.status]?.label||o.status}・${fmtYen(o.reward_amount)}）`).join('\n') || '（なし）';
  const skillList = skills.slice(0,5).map(s=>`- ${s.name}（使用${s.usage_count||0}回）`).join('\n') || '（未登録）';
  return `# 月次レビュー依頼（${month.replace('-','年')}月）\n\n## 今月の数字\n- 案件総数: ${opps.length}件\n- 応募: ${applied}件 / 受注: ${orders}件 / 受注率: ${winRate}%\n- 完了売上: ${fmtYen(revenue)}\n- 稼働中: ${active.length}件\n\n## 直近の案件一覧\n${oppList}\n\n## よく使うSkill（上位5）\n${skillList}\n\n## 依頼内容\n上記データをもとに以下の構成で月次振り返りレポートを作成してください。\n\n### 1. 今月の成果（数字と具体的な案件）\n### 2. 良かった点・再現したいこと\n### 3. 課題・改善点\n### 4. 来月の目標と行動計画（具体的な数字で）\n### 5. Skill・ナレッジで強化すべき点\n\n「本橋さん自身の言葉で振り返った」ような文体で、Nexusのナレッジとして保存できる形式でお願いします。`;
}
function MonthlyReviewBridge({ opps, skills }) {
  const { sb, user } = useApp();
  const now = new Date();
  const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [prompt, setPrompt] = useState('');
  const [reply, setReply] = useState('');
  const [copied, setCopied] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const generate = () => setPrompt(buildMonthlyReviewPrompt(opps, skills, month));
  const copy = async () => { try { await navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(()=>setCopied(false),1500); } catch(e){} };
  const save = async () => {
    if (!reply.trim()) return;
    setSaving(true);
    await sb.from('knowledge_items').insert({ user_id: user.id, title: `月次レビュー ${month.replace('-','年')}月`, category: 'general', content: reply, tags: ['月次レビュー', month], source_ref: 'Nexus月次レビュー' });
    setSaving(false); setSaved(true);
  };
  return (
    <div className="mt-6 rounded-xl border border-indigo-200 bg-indigo-50 p-5">
      <div className="mb-4 flex items-center justify-between gap-3">
        <div>
          <div className="text-sm font-semibold text-indigo-800">月次レビュー</div>
          <div className="text-xs text-indigo-600">{month.replace('-','年')}月の振り返り → ナレッジに保存</div>
        </div>
        <Btn variant="outline" size="sm" onClick={generate} className="border-indigo-300 text-indigo-700 shrink-0"><WandIcon size={14}/> 生成</Btn>
      </div>
      {prompt && (
        <>
          <textarea readOnly value={prompt} rows={8} className="w-full rounded-lg border border-indigo-200 bg-white p-3 font-mono text-xs leading-relaxed mb-2"/>
          <div className="mb-3 flex justify-end">
            <Btn variant="secondary" size="sm" onClick={copy}>{copied?<><CheckIcon size={14}/> コピー済み</>:<><CopyIcon size={14}/> Claudeにコピー</>}</Btn>
          </div>
          <Txta label="Claudeの振り返りを貼り付け" rows={6} value={reply} onChange={e=>{setReply(e.target.value);setSaved(false);}} placeholder="Claudeが生成した月次レビューをここに貼り付けます"/>
          <div className="mt-2 flex items-center justify-end gap-3">
            {saved && <span className="text-xs text-emerald-600">ナレッジに保存しました</span>}
            <Btn size="sm" disabled={!reply.trim()||saving} onClick={save}><SaveIcon size={14}/> ナレッジに保存</Btn>
          </div>
        </>
      )}
    </div>
  );
}

// ─── CALENDAR SCREEN ──────────────────────────────────────
function CalendarScreen() {
  const { sb, user, store, storeLoaded, fetchTable } = useApp();
  const loading = !storeLoaded;
  const [view, setView] = useState('week');
  const [weekOffset, setWeekOffset] = useState(0);
  const [monthOffset, setMonthOffset] = useState(0);
  const [addDate, setAddDate] = useState(null);   // 追加モーダル用
  const [editItem, setEditItem] = useState(null); // 編集モーダル用
  const [showImport, setShowImport] = useState(false);
  const [selDate, setSelDate] = useState(null);

  const load = async () => { await fetchTable('staff'); await fetchTable('schedules'); };
  useEffect(()=>{ load(); },[]);

  const [syncing, setSyncing] = useState(false);
  const [syncResult, setSyncResult] = useState('');

  // 既存スケジュールからスタッフ日程を一括同期
  const bulkSyncStaff = async () => {
    setSyncing(true); setSyncResult('');
    const scheds = store.schedules.filter(s =>
      s.status === 'todo' && s.staff_name && (s.category === 'education' || s.category === 'interview')
    );
    const { data: staffList } = await sb.from('staff_profiles').select('id,name').eq('user_id', user.id);
    if (!staffList) { setSyncing(false); return; }

    // スタッフごとに最も近い予定日を取得
    const eduMap = {}, ivMap = {};
    scheds.forEach(s => {
      const hit = staffList.find(p => s.staff_name.includes(p.name) || p.name.includes(s.staff_name));
      if (!hit || !s.scheduled_date) return;
      if (s.category === 'education') {
        if (!eduMap[hit.id] || s.scheduled_date < eduMap[hit.id]) eduMap[hit.id] = s.scheduled_date;
      } else {
        if (!ivMap[hit.id] || s.scheduled_date < ivMap[hit.id]) ivMap[hit.id] = s.scheduled_date;
      }
    });

    let count = 0;
    for (const [id, date] of Object.entries(eduMap)) {
      await sb.from('staff_profiles').update({ next_education_at: date }).eq('id', id).eq('user_id', user.id);
      count++;
    }
    for (const [id, date] of Object.entries(ivMap)) {
      await sb.from('staff_profiles').update({ next_interview_at: date }).eq('id', id).eq('user_id', user.id);
      count++;
    }
    await fetchTable('staff');
    setSyncing(false);
    setSyncResult(`${count}件のスタッフ日程を更新しました`);
  };

  const events = useMemo(()=>{
    const evs = [];
    (store.staff||[]).filter(s=>s.is_active).forEach(s => {
      if (s.next_education_at) evs.push({ date:s.next_education_at, label:`📚 ${s.name} 教育`, type:'education', source:'staff', readonly:true });
      if (s.next_interview_at) evs.push({ date:s.next_interview_at, label:`💬 ${s.name} 面談`, type:'interview', source:'staff', readonly:true });
    });
    (store.schedules||[]).forEach(s => {
      if (s.scheduled_date) {
        const cat = s.category;
        const dispType = cat==='education'?'education':cat==='interview'?'interview':s.type;
        const lbl = s.assignee ? `${s.title}（担当:${s.assignee}）` : s.title;
        evs.push({ date:s.scheduled_date, label:lbl, type:dispType, source:'schedule', id:s.id, done:s.status==='done', assignee:s.assignee, raw:s });
      }
    });
    evs.sort((a,b)=>a.date<b.date?-1:1);
    return evs;
  }, [store.staff, store.schedules]);

  const today = new Date(); today.setHours(0,0,0,0);
  const isoStr = (d) => localIso(d);
  const WEEKDAY_SHORT = ['日','月','火','水','木','金','土'];

  const toggleDone = async (ev) => {
    if (!ev.id) return;
    const next = ev.done ? 'todo' : 'done';
    await sb.from('schedules').update({ status:next }).eq('id',ev.id).eq('user_id',user.id);
    fetchTable('schedules');
  };
  const del = async (ev) => {
    if (!ev.id || !confirm('削除しますか？')) return;
    await sb.from('schedules').delete().eq('id',ev.id).eq('user_id',user.id);
    fetchTable('schedules');
  };

  // Week
  const getWeekDays = (offset) => {
    const start = new Date(today);
    start.setDate(today.getDate() + offset*7);
    return Array.from({length:7},(_,i)=>{ const d=new Date(start); d.setDate(start.getDate()+i); return d; });
  };
  const weekDays = useMemo(()=>getWeekDays(weekOffset),[weekOffset]);
  const weekLabel = weekOffset===0?'今日から7日間':weekOffset===-1?'先週':weekOffset===1?'来週以降':
    weekOffset<0?`${Math.abs(weekOffset)*7}日前から`:`${weekOffset*7}日後から`;

  // Month — all days
  const monthInfo = useMemo(()=>{
    const d = new Date(today.getFullYear(), today.getMonth()+monthOffset, 1);
    const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    const firstDow = d.getDay(); // 0=日
    // 前方の空白セル + 日付セル
    const cells = [];
    for (let i=0;i<firstDow;i++) cells.push(null);
    for (let i=1;i<=daysInMonth;i++) cells.push(isoStr(new Date(d.getFullYear(), d.getMonth(), i)));
    // 末尾を7の倍数に揃える
    while (cells.length % 7 !== 0) cells.push(null);
    return { label:`${d.getFullYear()}年${d.getMonth()+1}月`, cells };
  },[monthOffset, today]);

  const EventBadge = ({ev}) => {
    const cat = SCHED_CATS[ev.type] || SCHED_CATS.other;
    return (
    <div className={cn('flex items-center gap-1 text-xs py-1 px-2 rounded mb-0.5 group',
      ev.done?'bg-slate-100 text-slate-400':`${cat.card} ${cat.head}`)}>
      <span className={cn('flex-1 truncate', ev.done&&'line-through')} onClick={()=>ev.id&&setEditItem(ev.raw)}>{ev.label}</span>
      {!ev.readonly && (
        <button onClick={()=>toggleDone(ev)} className="opacity-0 group-hover:opacity-100 shrink-0 text-[10px] px-1 rounded bg-white/60">
          {ev.done?'戻す':'完了'}
        </button>
      )}
    </div>
  );};

  const DayCell = ({iso}) => {
    const d = new Date(iso+'T12:00:00');
    const dow = d.getDay();
    const dayEvs = events.filter(e=>e.date===iso);
    const isToday = iso===isoStr(today);
    const isPast = d < today;
    return (
      <div className={cn('rounded-xl border p-2.5 min-h-[52px]',
        isToday?'border-indigo-300 bg-indigo-50':isPast?'border-slate-100 bg-slate-50/60':'border-slate-200 bg-white')}>
        <div className="flex items-center justify-between mb-1">
          <span className={cn('text-xs font-semibold',
            isToday?'text-indigo-600':isPast?'text-slate-300':
            dow===0?'text-rose-500':dow===6?'text-blue-500':'text-slate-600')}>
            {d.getDate()}（{WEEKDAY_SHORT[dow]}）
          </span>
          <button onClick={()=>setAddDate(iso)}
            className="text-slate-300 hover:text-indigo-500 transition-colors text-base leading-none">＋</button>
        </div>

              const dayEvs = events.filter(e=>e.date===iso);
              const isToday = iso===isoStr(today);
              const isPast = d < today;
              const isSel = selDate===iso;
              return (
                <button key={iso} onClick={()=>setSelDate(isSel?null:iso)}
                  className={cn('aspect-square rounded-lg border p-1 flex flex-col items-center transition-colors',

                    isPast?'border-slate-100 bg-slate-50/50':'border-slate-200 bg-white',

                    isToday?'text-indigo-600':isPast?'text-slate-300':'text-slate-600')}>{d.getDate()}</span>

                    <div className="mt-0.5 flex flex-wrap gap-0.5 justify-center">

            <div className="mt-4 rounded-xl border border-indigo-200 bg-indigo-50 p-3">
              <div className="mb-2 flex items-center justify-between">

  );

function CalendarAddModal({ date, onClose, onSaved }) {
  const { sb, user } = useApp();
  const [title, setTitle] = useState('');
  const [type, setType] = useState('task');
  const [category, setCategory] = useState('education'); // education/interview/task
  const [staffName, setStaffName] = useState('');
  const [assignee, setAssignee] = useState('');
  const [staffList, setStaffList] = useState([]);
  const [scheduledDate, setScheduledDate] = useState(date);
  const [notes, setNotes] = useState('');
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    sb.from('staff_profiles').select('name').eq('user_id',user.id).eq('is_active',true)
      .then(({data})=>setStaffList((data||[]).map(s=>s.name)));
  },[]);

  // 教育/面談を選んだら、対象スタッフ＋種別からタイトル自動生成
  const autoTitle = (cat, staff) => {
    if (cat==='education' && staff) return `${staff} 教育`;
    if (cat==='interview' && staff) return `${staff} 面談`;
    return title;
  };

  const save = async () => {
    const finalTitle = (category==='education'||category==='interview')
      ? (staffName ? `${staffName} ${category==='education'?'教育':'面談'}` : title.trim())
      : title.trim();
    if (!finalTitle) return;
    setSaving(true);
    await sb.from('schedules').insert({
      user_id:user.id, title:finalTitle,
      type: category==='education'||category==='interview' ? 'meeting' : type,
      category, staff_name: staffName, assignee,
      scheduled_date:scheduledDate||null, status:'todo', notes
    });
    // スタッフの次回日程を自動更新
    if (staffName && scheduledDate) {
      const field = category==='education'?'next_education_at':category==='interview'?'next_interview_at':null;
      if (field) {
        const { data: matched } = await sb.from('staff_profiles').select('id,name').eq('user_id', user.id);
        if (matched) {
          const hit = matched.find(s => staffName.includes(s.name) || s.name.includes(staffName));
          if (hit) await sb.from('staff_profiles').update({ [field]: scheduledDate }).eq('id', hit.id).eq('user_id', user.id);
        }
      }
    }
    setSaving(false); onSaved();
  };
  return (
    <FullModal title="予定を追加" onClose={onClose} onSave={save} saving={saving}>
      <Sel label="種別" value={category} onChange={e=>setCategory(e.target.value)}>
        {Object.entries(SCHED_CATS).map(([k,v])=>(
          <option key={k} value={k}>{v.icon} {v.label}</option>
        ))}
      </Sel>

      {(category==='education'||category==='interview') ? (
        <>
          <Field label="対象スタッフ">
            <input list="staff-list" className={inputCls} value={staffName} onChange={e=>setStaffName(e.target.value)} placeholder="黒田くん"/>
            <datalist id="staff-list">
              {staffList.map(n=><option key={n} value={n}/>)}
            </datalist>
          </Field>
        </>
      ) : (
        <Inp label="タイトル" required value={title} onChange={e=>setTitle(e.target.value)} placeholder="月次報告 締切"/>
      )}

      <Inp label="担当者（誰が実施するか）" value={assignee} onChange={e=>setAssignee(e.target.value)} placeholder="本橋 / 岩間リーダー など"/>
      <Inp label="日付" type="date" value={scheduledDate} onChange={e=>setScheduledDate(e.target.value)}/>
      <Txta label="メモ（任意）" rows={2} value={notes} onChange={e=>setNotes(e.target.value)}/>
    </FullModal>
  );
}

function CalendarEditModal({ item, onClose, onSaved }) {
  const { sb, user } = useApp();
  const [title, setTitle] = useState(item.title||'');
  const [type, setType] = useState(item.type||'task');
  const [assignee, setAssignee] = useState(item.assignee||'');
  const [scheduledDate, setScheduledDate] = useState(item.scheduled_date||'');
  const [notes, setNotes] = useState(item.notes||'');
  const [saving, setSaving] = useState(false);

  const save = async () => {
    setSaving(true);
    await sb.from('schedules').update({ title:title.trim(), type, assignee, scheduled_date:scheduledDate||null, notes }).eq('id',item.id).eq('user_id',user.id);

        const { data: matched } = await sb.from('staff_profiles').select('id,name').eq('user_id', user.id);

          if (hit) await sb.from('staff_profiles').update({ [field]: scheduledDate }).eq('id', hit.id).eq('user_id', user.id);

function ScheduleImport({ onClose, onSaved }) {
  const { sb, user } = useApp();
  const [json, setJson] = useState('');
  const [list, setList] = useState(null);
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);
  const fileRef = useRef(null);

  const onFile = (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    const r = new FileReader(); r.onload=()=>{ setJson(String(r.result||'')); setList(null); }; r.readAsText(file);
  };
  const doParse = () => {
    setErr('');
    const cleaned = cleanJsonInput(json);
    try {
      let data = JSON.parse(cleaned);
      if (!Array.isArray(data)) data = [data];
      const valid = data.filter(d=>d&&d.title);
      if (valid.length===0){ setErr('titleを持つスケジュールが見つかりませんでした。'); return; }
      setList(valid);
    } catch(e){ setErr('JSONとして読み取れませんでした。'); }
  };
  const doImport = async () => {
    setSaving(true);
    const rows = list.map(d=>({
      user_id: user.id,
      title: d.title||'',
      type: ['task','meeting','deadline','other'].includes(d.type)?d.type:'task',
      scheduled_date: d.scheduled_date||d.date||null,
      status: 'todo',
      notes: d.notes||'',
    }));
    await sb.from('schedules').insert(rows);
    setSaving(false); onSaved();
  };
  return (
    <FullModal title="スケジュールJSONインポート" onClose={onClose}
      onSave={list?doImport:null} saveLabel={list?list.length+'件を登録':'登録'} saving={saving}>
      <p className="text-xs text-slate-500">スケジュールのJSONを貼り付けるかファイルを選択してください。</p>
      <div className="flex gap-2">
        <input ref={fileRef} type="file" accept=".json" onChange={onFile} className="hidden"/>
        <Btn variant="outline" size="sm" onClick={()=>fileRef.current?.click()}>📁 ファイルを選択</Btn>
      </div>
      <Txta label="スケジュール JSON" rows={8} value={json} onChange={e=>{setJson(e.target.value);setList(null);}}
        placeholder='[ { "title": "黒田くん 教育", "scheduled_date": "2026-06-14", "type": "task" } ]'/>
      <Btn variant="outline" size="sm" onClick={doParse} disabled={!json.trim()}>内容を確認</Btn>
      {err && <ErrState error={err}/>}
      {list && (
        <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-4">
          <div className="mb-2 text-sm font-semibold text-emerald-800">{list.length}件を登録します</div>
          <div className="space-y-1 max-h-52 overflow-y-auto">
            {list.map((d,i)=><div key={i} className="text-sm text-slate-700">・{d.title} <span className="text-xs text-slate-400">{d.scheduled_date||d.date||''}</span></div>)}
          </div>
        </div>
      )}
      <details className="rounded-xl border border-slate-200 bg-slate-50 p-3">
        <summary className="cursor-pointer text-xs font-medium text-slate-600">JSON形式の例</summary>
        <pre className="mt-2 font-mono text-[10px] text-slate-600 whitespace-pre-wrap">{`[
  {
    "title": "黒田くん 教育",
    "category": "education",
    "scheduled_date": "2026-06-14",
    "assignee": "本橋",
    "staff_name": "黒田",
    "notes": ""
  },
  {
    "title": "飯島さん 面談",
    "category": "interview",
    "scheduled_date": "2026-06-18",
    "assignee": "岩間リーダー",
    "notes": "モチベーション確認"
  }
]

category 一覧:
education（教育）/ interview（面談）
meeting（打ち合わせ）/ followup（フォロー）
deadline（締切）/ report（報告）
training（研修）/ other（その他）`}</pre>
      </details>
    </FullModal>
  );
}

// ─── KPI SCREEN ───────────────────────────────────────────
function KpiScreen() {
  const { sb, user } = useApp();
  const [opps, setOpps] = useState([]);
  const [skills, setSkills] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const load = async () => {
      const [{ data: o }, { data: s }] = await Promise.all([
        sb.from('opportunities').select('*').eq('user_id', user.id),
        sb.from('skills').select('name,usage_count').eq('user_id', user.id).order('usage_count', { ascending: false }).limit(10),
      ]);
      setOpps(o||[]); setSkills(s||[]); setLoading(false);
    };
    load();
  }, []);

  const stats = useMemo(() => {
    const applied = opps.filter(o=>!['candidate','analyzing'].includes(o.status)).length;
    const orders = opps.filter(o=>['won','in_progress','awaiting_delivery','delivered','done','revision'].includes(o.status)).length;
    const delivered = opps.filter(o=>['delivered','done'].includes(o.status));
    const revenue = delivered.reduce((s,o)=>s+o.reward_amount,0);
    const avg = delivered.length>0 ? Math.round(revenue/delivered.length) : 0;
    const winRate = applied>0 ? Math.round(orders/applied*100) : 0;
    return { total: opps.length, applied, orders, winRate, delivered: delivered.length, revenue, avg };
  }, [opps]);

  const months = useMemo(() => {
    const map = {};
    opps.filter(o=>['delivered','done'].includes(o.status)).forEach(o => {
      const m = (o.updated_at||o.created_at||'').slice(0,7);
      if (!map[m]) map[m] = { month: m, revenue: 0, count: 0 };
      map[m].revenue += o.reward_amount;
      map[m].count++;
    });
    return Object.values(map).sort((a,b)=>a.month<b.month?-1:1).slice(-6);
  }, [opps]);
  const maxRev = months.length > 0 ? Math.max(...months.map(m=>m.revenue), 1) : 1;

  if (loading) return <LoadingState/>;
  return (
    <>
      <PageHeader title="KPI" subtitle="案件データから自動集計"/>
      <section className="mb-7 grid grid-cols-2 gap-3">
        {[
          { label:'案件候補数', value: stats.total, unit:'件' },
          { label:'応募数', value: stats.applied, unit:'件' },
          { label:'受注数', value: stats.orders, unit:'件', accent:'text-emerald-600' },
          { label:'受注率', value: stats.winRate+'%', accent:'text-emerald-600' },
          { label:'納品数', value: stats.delivered, unit:'件' },
          { label:'累計売上', value: fmtYen(stats.revenue), accent:'text-indigo-600' },
          { label:'平均単価', value: fmtYen(stats.avg), accent:'text-indigo-600' },
          { label:'稼働案件', value: opps.filter(o=>['won','in_progress','awaiting_delivery','revision'].includes(o.status)).length, unit:'件', accent:'text-amber-600' },
        ].map(card => (
          <div key={card.label} className="rounded-xl border border-slate-200 bg-white p-4">
            <div className="text-xs text-slate-500">{card.label}</div>
            <div className={cn('mt-1 font-mono text-2xl font-bold', card.accent||'text-slate-900')}>
              {card.value}<span className="text-sm font-normal text-slate-400 ml-0.5">{card.unit||''}</span>
            </div>
          </div>
        ))}
      </section>

      {months.length > 0 && (
        <section className="rounded-xl border border-slate-200 bg-white p-5">
          <SectionTitle>売上推移（納品済み）</SectionTitle>
          <div className="flex items-end gap-2 pt-2" style={{height:140}}>
            {months.map((m,i) => {
              const h = Math.max(4, Math.round(m.revenue/maxRev*110));
              const isLast = i === months.length-1;
              return (
                <div key={m.month} className="flex flex-1 flex-col items-center gap-1.5">
                  <span className={cn('font-mono text-[10px]', isLast?'text-indigo-600':'text-slate-400')}>
                    {fmtYenMan(m.revenue)}
                  </span>
                  <div className={cn('w-full rounded-t', isLast?'bg-indigo-500':'bg-slate-200')} style={{height:h}}/>
                  <span className="text-[10px] text-slate-400">{m.month.slice(5)}月</span>
                </div>
              );
            })}
          </div>
        </section>
      )}
      <MonthlyReviewBridge opps={opps} skills={skills}/>
    </>
  );
}

// ─── APP SHELL ────────────────────────────────────────────
const NAV_ITEMS = [
  { screen:'home',      label:'ホーム',    Icon:HomeIcon },
  { screen:'staff',     label:'スタッフ',  Icon:UsersIcon },
  { screen:'calendar',  label:'カレンダー',Icon:CalendarIcon },
  { screen:'skills',    label:'Skill',     Icon:SparklesIcon },
  { screen:'knowledge', label:'ナレッジ',  Icon:BookOpenIcon },
];

function AppShell({ children, currentScreen, navTo }) {
  const rootScreen = currentScreen.screen;
  const activeNav = ['oppDetail','oppNew','opps'].includes(rootScreen) ? 'home'
    : rootScreen === 'kwDetail' ? 'knowledge'
    : ['searchRun','candidates','candidateDetail','searchExplore','explore'].includes(rootScreen) ? 'home'
    : ['staffDetail'].includes(rootScreen) ? 'staff'
    : ['quicklog','capture'].includes(rootScreen) ? 'home'
    : ['kpi','calendar'].includes(rootScreen) ? 'home'
    : rootScreen;

  return (
    <div className="flex min-h-screen flex-col md:flex-row">
      {/* Mobile safe area top fill */}
      <div className="fixed inset-x-0 top-0 z-[200] mobile-safe-top bg-slate-50 md:hidden"/>
      {/* Desktop sidebar */}
      <aside className="hidden md:flex md:w-56 md:flex-col md:fixed md:inset-y-0 border-r border-slate-200 bg-white">
        <div className="flex h-16 items-center gap-2 px-5 border-b border-slate-100 safe-pt md:safe-pt">
          <div className="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 font-mono text-base font-bold text-white shrink-0">N</div>
          <div>
            <div className="text-sm font-semibold">Nexus</div>
            <div className="font-mono text-[10px] text-slate-400">personal AI OS</div>
          </div>
        </div>
        <nav className="flex-1 px-3 py-3 space-y-0.5">
          {NAV_ITEMS.map(({screen,label,Icon})=>(
            <button key={screen} onClick={()=>navTo(screen)}
              className={cn('flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors',
                activeNav===screen ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100')}>
              <Icon size={18}/>{label}
            </button>
          ))}
          <button onClick={()=>navTo('staff')}
            className={cn('flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors',
              activeNav==='staff' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100')}>
            <UsersIcon size={18}/>スタッフ
          </button>
          <button onClick={()=>navTo('schedule')}
            className={cn('flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors',
              activeNav==='schedule' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100')}>
            <CalendarIcon size={18}/>スケジュール
          </button>
          <button onClick={()=>navTo('calendar')}
            className={cn('flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors',
              activeNav==='calendar' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100')}>
            <CalendarIcon size={18}/>カレンダー
          </button>
          <button onClick={()=>navTo('kpi')}
            className={cn('flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors',
              activeNav==='kpi' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100')}>
            <BarChartIcon size={18}/>KPI
          </button>
          <button onClick={()=>navTo('settings')}
            className={cn('flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors',
              activeNav==='settings' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-100')}>
            <SettingsIcon size={18}/>設定
          </button>
        </nav>
      </aside>

      {/* Main */}
      <div className="flex-1 md:ml-56">
        <main className="mx-auto max-w-2xl px-4 pb-28 md:pb-12 md:pt-8 md:px-8"
          style={{paddingTop: 'calc(env(safe-area-inset-top, 0px) + 24px)'}}>
          {children}
        </main>
      </div>

      {/* Mobile bottom nav */}
      <nav className="fixed bottom-0 inset-x-0 z-30 md:hidden bg-white/95 backdrop-blur border-t border-slate-200 safe-pb">
        <div className="flex">
          {NAV_ITEMS.map(({screen,label,Icon})=>(
            <button key={screen} onClick={()=>navTo(screen)}
              className={cn('flex flex-1 flex-col items-center gap-1 pt-2.5 pb-1 text-[10px] font-medium',
                activeNav===screen ? 'text-indigo-600' : 'text-slate-400')}>
              <Icon size={22}/>
              {label}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────
function App() {
  const [cfg, setCfg] = useState(() => {
    try { const s = localStorage.getItem('nexus_cfg'); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const [sb, setSb] = useState(() => {
    try {
      const s = localStorage.getItem('nexus_cfg');
      if (!s) return null;
      const { url, key } = JSON.parse(s);
      return window.supabase.createClient(url, key);
    } catch { return null; }
  });
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [history, setHistory] = useState([{ screen: 'home' }]);

  // ─── 共有データストア（方式1：保存時のみ該当テーブル再取得）───
  const [store, setStore] = useState({ skills:[], staff:[], knowledge:[], schedules:[] });
  const [storeLoaded, setStoreLoaded] = useState(false);
  const [syncing, setSyncing] = useState(false);

  const fetchTable = useCallback(async (key) => {
    if (!sb || !user) return;
    const q = {
      skills:    () => sb.from('skills').select('*').eq('user_id', user.id).order('usage_count', { ascending: false }),
      staff:     () => sb.from('staff_profiles').select('*').eq('user_id', user.id).order('is_active', { ascending:false }).order('sort_order').order('name'),
      knowledge: () => sb.from('knowledge_items').select('*').eq('user_id', user.id).order('updated_at', { ascending: false }),
      schedules: () => sb.from('schedules').select('*').eq('user_id', user.id).order('scheduled_date', { ascending: true }),
    }[key];
    if (!q) return;
    try {
      const { data } = await q();
      setStore(s => ({ ...s, [key]: data || [] }));
    } catch(e) {}
  }, [sb, user]);

  const refreshAll = useCallback(async (silent=false) => {
    if (!sb || !user) return;
    if (!silent) setSyncing(true);
    await Promise.all([fetchTable('skills'), fetchTable('staff'), fetchTable('knowledge'), fetchTable('schedules')]);
    setStoreLoaded(true);
    if (!silent) setSyncing(false);
  }, [sb, user, fetchTable]);

  // 初回ロード
  useEffect(() => {
    if (sb && user && !storeLoaded) refreshAll(true);
  }, [sb, user, storeLoaded, refreshAll]);

  // 5分毎バックグラウンド同期
  useEffect(() => {
    if (!sb || !user) return;
    const t = setInterval(() => refreshAll(true), 5*60*1000);
    return () => clearInterval(t);
  }, [sb, user, refreshAll]);

  const currentRoute = history[history.length - 1];

  const nav = useCallback((screen, params = {}) => {
    setHistory(h => [...h, { screen, ...params }]);
  }, []);
  const back = useCallback(() => {
    setHistory(h => h.length > 1 ? h.slice(0, -1) : h);
  }, []);
  const navTo = useCallback((screen) => {
    setHistory([{ screen }]);
  }, []);

  useEffect(() => {
    if (!sb) { setAuthLoading(false); return; }
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setAuthLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, [sb]);

  const handleSetupComplete = ({ url, key }) => {
    const client = window.supabase.createClient(url, key);
    setSb(client);
    setCfg({ url, key });
  };

  if (!cfg || !sb) return <SetupScreen onComplete={handleSetupComplete}/>;
  if (authLoading) return <div className="flex min-h-screen items-center justify-center text-sm text-slate-400">起動中...</div>;
  if (!user) return <AuthScreen sb={sb}/>;

  const ctx = { sb, user, nav, back, navTo, currentRoute, store, storeLoaded, syncing, fetchTable, refreshAll };

  const renderScreen = () => {
    const { screen, id } = currentRoute;
    switch (screen) {
      case 'home':      return <HomeScreen/>;
      case 'opps':      return <OpportunitiesScreen/>;
      case 'oppDetail': return <OppDetailScreen id={id}/>;
      case 'oppNew':    return <OpportunitiesScreen/>;
      case 'skills':    return <SkillsScreen/>;
      case 'knowledge': return <KnowledgeScreen/>;
      case 'kwDetail':  return <KnowledgeDetailScreen id={id}/>;
      case 'schedule':  return <ScheduleScreen/>;
      case 'kpi':            return <KpiScreen/>;
      case 'calendar':       return <CalendarScreen/>;
      case 'quicklog':       return <CaptureScreen/>;
      case 'capture':        return <CaptureScreen/>;
      case 'staff':          return <StaffScreen/>;
      case 'staffDetail':    return <StaffDetailScreen id={id}/>;
      case 'settings':       return <SettingsScreen/>;
      case 'explore':        return <SearchScreen/>;
      case 'searchExplore':  return <SearchScreen/>;
      case 'searchRun':      return <SearchRunScreen conditionId={id}/>;
      case 'candidates':     return <JobCandidateListScreen/>;
      case 'candidateDetail': return <JobCandidateDetailScreen id={id}/>;
      default:               return <HomeScreen/>;
    }
  };

  return (
    <Ctx.Provider value={ctx}>
      <AppShell currentScreen={currentRoute} navTo={navTo}>
        {renderScreen()}
      </AppShell>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
