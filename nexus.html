  <script>
    // 画面が真っ白になる代わりにエラー内容を表示する（デバッグ用）
    window.addEventListener('error', function(e){
      var r = document.getElementById('root');
      if (r && !r.hasChildNodes()) {
        var msg = (e && e.message) || (e && e.error && e.error.message) || '不明なエラー';
        var loc = e && e.lineno ? ('行 ' + e.lineno + ':' + (e.colno||'')) : '';
        var stack = (e && e.error && e.error.stack) ? ('\n\n' + e.error.stack) : '';
        r.innerHTML = '<div style="padding:20px;font-family:ui-monospace,monospace;font-size:12px;color:#b91c1c;white-space:pre-wrap;line-height:1.6;">'
          + '⚠️ 読み込みエラー\n\n' + msg + '\n' + loc + stack + '</div>';
      }
    });
  </script>

// ─── UTILITIES ────────────────────────────────────────────
function cn(...args) { return args.filter(Boolean).join(' '); }
function fmtYen(n) { return '¥' + (n || 0).toLocaleString('ja-JP'); }
function fmtYenMan(n) {
  if (n >= 10000) { const m = n/10000; return (Number.isInteger(m) ? m : m.toFixed(1)) + '万円'; }
  return fmtYen(n);
}
// ローカル日付文字列（タイムゾーンズレ防止）
function localIso(d) {
  if (!d) d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function fmtDateFull(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function fmtHours(min) {
  const h = min / 60;
  return (Number.isInteger(h) ? h : h.toFixed(1)) + 'h';
}
function daysUntil(iso) {
  if (!iso) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}
function deadlineLabel(iso) {
  const d = daysUntil(iso);
  if (d === null) return '納期未定';
  if (d < 0) return `${Math.abs(d)}日超過`;
  if (d === 0) return '本日締切';
  return `あと${d}日`;
}

function Btn({ children, variant='primary', size='md', onClick, disabled, type='button', className='' }) {

  const variants = {
    primary: 'bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800',
    secondary: 'bg-slate-100 text-slate-700 hover:bg-slate-200 active:bg-slate-300',
    ghost: 'text-slate-600 hover:bg-slate-100 active:bg-slate-200',
    danger: 'bg-rose-50 text-rose-600 hover:bg-rose-100 active:bg-rose-200',
    outline: 'border border-slate-200 bg-white text-slate-700 hover:bg-slate-50',
  };
  const sizes = { sm: 'px-2.5 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-base' };
  return (
    <button type={type} onClick={onClick} disabled={disabled}

    </button>
  );
}

// ─── PROMPT BRIDGE ────────────────────────────────────────
function buildPrompt(kind, opp) {
  const head = `# ${BRIDGE_KIND_LABELS[kind]} の作成依頼\n\n## 案件情報\n- 案件名: ${opp.title}\n- 媒体: ${SOURCE_META[opp.source]?.label || opp.source}\n- 報酬: ${fmtYen(opp.reward_amount)}\n- 納期: ${opp.deadline || '未定'}\n- カテゴリ: ${opp.category}\n\n## 案件本文\n${opp.description}\n`;
  const bodies = {
    analysis: `\n## 依頼内容\n上記案件を100点満点で採点し、受注可否を判断してください。\n採点軸：AI適性 / 本橋適性 / 想定作業時間 / 難易度 / 報酬妥当性 / 納期リスク / クライアントリスク\n最後に総合スコアと、応募する場合の訴求ポイント3点を挙げてください。`,
    proposal: `\n## 依頼内容\n応募用の提案文を作成してください。\n構成: 挨拶→案件理解→対応できる理由→具体的な進め方→納期目安→修正対応可否→締め\nコピペしてそのまま送れる形式でお願いします。`,
    deliverable: `\n## 依頼内容\n受注済みです。成果物の本体を作成してください。\n※ 成果物タイプ・必要条件はこの下に追記します。`,
    delivery: `\n## 依頼内容\n成果物が完成したので納品メッセージを作成してください。\n構成: 挨拶→納品内容→確認依頼→修正対応可能である旨→締め\nコピペしてそのまま送れる形式でお願いします。`,
    revision: `\n## 依頼内容\n修正依頼が来ました。この下に修正依頼文を貼ります。\n1) 修正内容の整理、2) 修正方針、3) 修正版、4) 返信文の順で出力してください。`,
  };
  return head + (bodies[kind] || '');
}

function PromptBridge({ kind, opp }) {
  const { sb, user } = useApp();
  const [prompt, setPrompt] = useState('');
  const [reply, setReply] = useState('');
  const [copied, setCopied] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [skills, setSkills] = useState([]);
  const [selectedSkillId, setSelectedSkillId] = useState('');

  useEffect(() => {
    sb.from('skills').select('id,name,prompt_template,usage_count').eq('user_id', user.id).order('usage_count', { ascending: false })
      .then(({ data }) => setSkills(data||[]));
  }, []);

  const generate = () => {
    const sk = skills.find(s => s.id === selectedSkillId);
    const base = buildPrompt(kind, opp);
    const tpl = sk?.prompt_template ? `

## Skillテンプレート（${sk.name}）
${sk.prompt_template}` : '';
    setPrompt(base + tpl);
    setSaved(false);
  };
  const copy = async () => {
    try { await navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(()=>setCopied(false),1500); } catch(e){}
  };
  const save = async () => {
    if (!reply.trim()) return;
    setSaving(true);
    await sb.from('prompt_runs').insert({ user_id: user.id, opportunity_id: opp.id, kind, prompt_text: prompt, ai_response: reply });
    if (selectedSkillId) {
      const sk = skills.find(s => s.id === selectedSkillId);
      if (sk) {
        await sb.from('skills').update({ usage_count: (sk.usage_count||0)+1, last_used_at: localIso() })
          .eq('id', selectedSkillId).eq('user_id', user.id);
      }
    }
    setSaving(false); setSaved(true);
  };

  return (
    <div className="space-y-4">
      {skills.length > 0 && (
        <div className="rounded-xl border border-indigo-100 bg-indigo-50 p-3">
          <label className="mb-1.5 block text-xs font-medium text-indigo-700">使用するSkill（任意）</label>
          <select value={selectedSkillId} onChange={e=>setSelectedSkillId(e.target.value)}
            className="w-full rounded-lg border border-indigo-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
            <option value="">選択しない</option>
            {skills.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          {selectedSkillId && skills.find(s=>s.id===selectedSkillId)?.prompt_template && (
            <p className="mt-1.5 text-xs text-indigo-600">✓ テンプレートをプロンプトに追加します。保存時に使用回数も更新します。</p>
          )}
          {selectedSkillId && !skills.find(s=>s.id===selectedSkillId)?.prompt_template && (
            <p className="mt-1.5 text-xs text-indigo-500">保存時にこのSkillの使用回数を更新します。</p>
          )}
        </div>
      )}
      <div className="rounded-xl border border-slate-200 bg-white p-4">
        <div className="mb-3 flex items-center justify-between">
          <span className="text-sm font-medium text-slate-700">1. プロンプト生成</span>
          <Btn variant="outline" size="sm" onClick={generate}><WandIcon size={14}/> 生成</Btn>
        </div>
        {prompt ? (
          <>
            <textarea readOnly value={prompt} className="w-full rounded-lg border border-slate-100 bg-slate-50 p-3 font-mono text-xs leading-relaxed" rows={8}/>
            <div className="mt-2 flex justify-end">
              <Btn variant="secondary" size="sm" onClick={copy}>
                {copied ? <><CheckIcon size={14}/> コピー済み</> : <><CopyIcon size={14}/> Claudeにコピー</>}
              </Btn>
            </div>
          </>
        ) : (
          <p className="py-8 text-center text-xs text-slate-400">「生成」を押すとClaudeに渡すプロンプトが生成されます</p>
        )}
      </div>
      <div className="rounded-xl border border-slate-200 bg-white p-4">
        <div className="mb-2 text-sm font-medium text-slate-700">2. Claudeの回答を貼り付け → 保存</div>
        <textarea value={reply} onChange={e=>{setReply(e.target.value);setSaved(false);}}
          placeholder="Claudeで生成した回答をここに貼り付けます"
          className={cn(inputCls,'resize-y')} rows={6}/>
        <div className="mt-2 flex items-center justify-end gap-3">
          {saved && <span className="text-xs text-emerald-600">保存しました{selectedSkillId?' / Skill使用回数を更新しました':''}</span>}
          <Btn size="sm" disabled={!reply.trim()||saving} onClick={save}>
            <SaveIcon size={14}/> {saving ? '保存中…' : '保存'}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ─── AUTH SCREEN ──────────────────────────────────────────
function AuthScreen({ sb }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [msg, setMsg] = useState('');

  const submit = async () => {
    setErr(''); setMsg(''); setLoading(true);
    const { error } =
      mode === 'login'
        ? await sb.auth.signInWithPassword({ email, password: pass })
        : await sb.auth.signUp({ email, password: pass });
    setLoading(false);
    if (error) { setErr(error.message); return; }
    if (mode === 'register') setMsg('登録完了。メール認証が必要な場合はメールを確認してください。（不要な場合はそのままログインできます）');
  };

  return (
    <div className="flex min-h-screen flex-col items-center justify-center px-6">
      <div className="mb-8 text-center">
        <div className="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-600 font-mono text-2xl font-bold text-white">N</div>
        <h1 className="text-2xl font-bold">Nexus</h1>
        <p className="mt-1 text-sm text-slate-500">{mode === 'login' ? 'ログイン' : '新規登録'}</p>
      </div>
      <div className="w-full max-w-sm space-y-4">
        <Inp label="メールアドレス" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"/>
        <Inp label="パスワード" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="8文字以上"/>
        {err && <p className="text-xs text-rose-500">{err}</p>}
        {msg && <p className="text-xs text-emerald-600">{msg}</p>}
        <Btn className="w-full" onClick={submit} disabled={loading}>
          {loading ? '処理中…' : (mode === 'login' ? 'ログイン' : '登録')}
        </Btn>
        <button onClick={()=>{setMode(m=>m==='login'?'register':'login');setErr('');setMsg('');}}
          className="w-full text-center text-xs text-indigo-600">
          {mode === 'login' ? '初めての方は登録' : 'すでにアカウントがある方はログイン'}
        </button>
      </div>
    </div>
  );
}

// ─── HOME SCREEN ──────────────────────────────────────────
function HomeScreen() {
  const { sb, user, nav, store, storeLoaded, syncing, refreshAll } = useApp();
  const skills = store.skills;
  const loading = !storeLoaded;
  const [showSmartRun, setShowSmartRun] = useState(false);

  const staffFollow = useMemo(() => {
    const t = new Date(); t.setHours(0,0,0,0);
    const daysSince = (iso) => { if (!iso) return 999; const d=new Date(iso); d.setHours(0,0,0,0); return Math.round((t-d)/86400000); };
    const daysUntilDate = (iso) => { if (!iso) return null; const d=new Date(iso); d.setHours(0,0,0,0); return Math.round((d-t)/86400000); };
    const active = (store.staff||[]).filter(s => s.is_active);
    const needsEdu = active.filter(s => daysSince(s.last_education_at) >= 14);
    const needsIv  = active.filter(s => daysSince(s.last_interview_at) >= 30);
    const edNoSched   = needsEdu.filter(s => !s.next_education_at);
    const edScheduled = needsEdu.filter(s =>  s.next_education_at);
    const ivNoSched   = needsIv.filter(s =>  !s.next_interview_at);
    const ivScheduled = needsIv.filter(s =>   s.next_interview_at);
    const weekEvents = (store.schedules||[]).filter(s=>s.status==='todo').flatMap(s => {
      const du = daysUntilDate(s.scheduled_date);
      if (du === null || du < 0 || du > 4) return [];
      return [{ title:s.title, type:s.category||'task', assignee:s.assignee||'', date:s.scheduled_date, daysUntil:du }];
    }).sort((a,b)=>a.daysUntil-b.daysUntil);
    return { edNoSched, edScheduled, ivNoSched, ivScheduled, weekEvents };
  }, [store.staff, store.schedules]);

  const today = new Date().toLocaleDateString('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'long',day:'numeric',weekday:'short'});

  const ACTIONS = [
    { key:'capture',  icon:'🎤', title:'Capture',   desc:'30秒で保存する',       screen:'capture',  tone:'indigo' },
    { key:'smartrun', icon:'⚡', title:'Smart Run',  desc:'今やるべきことを確認', action:()=>setShowSmartRun(true), tone:'amber' },
    { key:'calendar', icon:'🗓', title:'カレンダー', desc:'予定・スケジュール',    screen:'calendar', tone:'slate' },
    { key:'skills',   icon:'⭐', title:'Skill',       desc:'再利用テンプレート',   screen:'skills',   tone:'indigo' },
  ];
  const toneCls = {
    indigo:'border-indigo-200 bg-indigo-50 hover:border-indigo-300',
    amber:'border-amber-200 bg-amber-50 hover:border-amber-300',
    emerald:'border-emerald-200 bg-emerald-50 hover:border-emerald-300',
    slate:'border-slate-200 bg-white hover:border-slate-300',
  };

  if (loading) return <LoadingState/>;
  return (
    <>
      <PageHeader title="Nexus" subtitle={today}
        action={<Btn variant="ghost" size="sm" onClick={()=>refreshAll(false)} disabled={syncing}>
          <Repeat2Icon size={14} className={syncing?'animate-spin':''}/> {syncing?'同期中':'更新'}
        </Btn>}/>

      {/* フォロー・予定アラート */}
      {(staffFollow.edNoSched.length > 0 || staffFollow.ivNoSched.length > 0) && (
        <button onClick={()=>nav('staff')} className="mb-3 w-full rounded-xl border border-rose-200 bg-rose-50 p-3 text-left space-y-1.5">
          <div className="text-xs font-bold text-rose-600">⚠️ フォロー必要（予定なし）</div>
          {staffFollow.edNoSched.length > 0 && <div className="text-xs text-rose-500">📚 教育：{staffFollow.edNoSched.map(s=>s.name).join('・')}</div>}
          {staffFollow.ivNoSched.length > 0 && <div className="text-xs text-rose-500">💬 面談：{staffFollow.ivNoSched.map(s=>s.name).join('・')}</div>}
        </button>
      )}
      {(staffFollow.edScheduled.length > 0 || staffFollow.ivScheduled.length > 0) && (
        <button onClick={()=>nav('staff')} className="mb-3 w-full rounded-xl border border-amber-200 bg-amber-50 p-3 text-left space-y-1.5">
          <div className="text-xs font-bold text-amber-700">📅 フォロー必要（予定あり）</div>
          {staffFollow.edScheduled.map(s=><div key={s.name} className="text-xs text-amber-600">📚 {s.name}：{s.next_education_at}</div>)}
          {staffFollow.ivScheduled.map(s=><div key={s.name} className="text-xs text-amber-600">💬 {s.name}：{s.next_interview_at}</div>)}
        </button>
      )}
      {(() => {
        const now = new Date(); now.setHours(0,0,0,0);
        const end = new Date(now); end.setDate(now.getDate()+4);
        const fmt = (d) => `${d.getMonth()+1}/${d.getDate()}`;
        const rangeLabel = `${fmt(now)}〜${fmt(end)}`;
        // 今日〜4日後の5日分のスロットを生成
        const slots = Array.from({length:5},(_,i)=>{
          const d = new Date(now); d.setDate(now.getDate()+i);
          const iso = localIso(d);
          const evs = staffFollow.weekEvents.filter(e=>e.date===iso);
          return { iso, d, i, evs };
        });
        return (
          <div className="mb-3">
            <div className="mb-2 flex items-center justify-between">
              <span className="text-xs font-bold text-slate-600">🗓 直近の予定</span>
              <button onClick={()=>nav('calendar')} className="text-xs text-indigo-500">{rangeLabel} →</button>
            </div>
            <div className="flex gap-2 overflow-x-auto pb-1" style={{scrollbarWidth:'none'}}>
              {slots.map(({iso, d, i, evs})=>{
                const dayLabel = i===0?'今日':i===1?'明日':`${d.getMonth()+1}/${d.getDate()}`;
                const DOW = ['日','月','火','水','木','金','土'][d.getDay()];
                const hasEv = evs.length > 0;
                const firstEv = evs[0];
                const cat = hasEv ? (SCHED_CATS[firstEv.type]||SCHED_CATS.other) : null;
                const toneCard = !hasEv ? 'border-slate-100 bg-slate-50' : cat.card;
                const toneHead = !hasEv ? 'text-slate-300' : cat.head;
                return (
                  <button key={iso} onClick={()=>nav('calendar')}
                    className={cn('shrink-0 rounded-xl border p-3 text-left transition-colors', toneCard, 'w-[88px]')}>
                    <div className={cn('text-xs font-bold', toneHead)}>{dayLabel}</div>
                    <div className="text-[10px] text-slate-400 mb-1">{DOW}曜</div>
                    {!hasEv
                      ? <div className="text-[10px] text-slate-300">予定なし</div>
                      : evs.slice(0,2).map((e,j)=>{
                          const ec = SCHED_CATS[e.type]||SCHED_CATS.other;
                          return <div key={j} className={cn('text-[10px] leading-tight line-clamp-1 font-medium', ec.head)}>{e.title}</div>;
                        })
                    }
                    {evs.length > 2 && <div className="text-[10px] text-slate-400 mt-0.5">+{evs.length-2}件</div>}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* アクションランチャー */}
      <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
        {ACTIONS.map(a => (
          <button key={a.key}
            onClick={() => a.action ? a.action() : nav(a.screen)}
            className={cn('w-full rounded-xl border-2 p-4 text-left transition-colors', toneCls[a.tone])}>
            <div className="flex items-center gap-3">
              <span className="text-2xl shrink-0">{a.icon}</span>
              <div className="min-w-0">
                <div className="text-sm font-semibold text-slate-800">{a.title}</div>
                <div className="text-xs text-slate-500">{a.desc}</div>
              </div>
            </div>
          </button>
        ))}
      </div>

      {showSmartRun && <SkillSmartRun skills={skills} onClose={()=>setShowSmartRun(false)}/>}
    </>
  );
}

const OPP_DEFAULTS = { title:'', source:'crowdworks', url:'', client_name:'', description:'', reward_amount:0, deadline:'', category:'', status:'candidate', score:'', required_skills:'', memo:'' };

function OppForm({ initial, onClose, onSaved }) {
  const { sb, user } = useApp();
  const [f, setF] = useState(initial ? {
    ...initial,
    required_skills: (initial.required_skills||[]).join(', '),
    score: initial.score ?? '',
    reward_amount: initial.reward_amount ?? 0,
    deadline: initial.deadline || '',
  } : { ...OPP_DEFAULTS });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const upd = k => e => setF(v => ({ ...v, [k]: e.target.value }));

  const save = async () => {
    if (!f.title.trim()) { setErr('タイトルを入力してください'); return; }
    setSaving(true);
    const payload = {
      ...f,
      user_id: user.id,
      reward_amount: parseInt(f.reward_amount) || 0,
      score: f.score === '' ? null : parseInt(f.score),
      deadline: f.deadline || null,
      required_skills: f.required_skills ? f.required_skills.split(',').map(s=>s.trim()).filter(Boolean) : [],
    };
    let error;
    if (f.id) {
      ({ error } = await sb.from('opportunities').update(payload).eq('id', f.id).eq('user_id', user.id));
    } else {
      ({ error } = await sb.from('opportunities').insert(payload));
    }
    setSaving(false);
    if (error) { setErr(error.message); return; }
    onSaved();
  };

  return (
    <FullModal title={f.id ? '案件を編集' : '案件を追加'} onClose={onClose} onSave={save} saving={saving}>
      {err && <ErrState error={err}/>}
      <Inp label="タイトル" required value={f.title} onChange={upd('title')} placeholder="案件名"/>
      <Sel label="媒体" value={f.source} onChange={upd('source')}>
        {Object.entries(SOURCE_META).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
      </Sel>
      <Sel label="ステータス" value={f.status} onChange={upd('status')}>
        {Object.entries(STATUS_META).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
      </Sel>
      <Inp label="報酬（円）" type="number" value={f.reward_amount} onChange={upd('reward_amount')} placeholder="50000"/>
      <Inp label="納期" type="date" value={f.deadline} onChange={upd('deadline')}/>
      <Inp label="カテゴリ" value={f.category} onChange={upd('category')} placeholder="議事録 / 提案書 / 研修資料 など"/>
      <Inp label="クライアント名" value={f.client_name} onChange={upd('client_name')}/>
      <Inp label="案件URL" type="url" value={f.url} onChange={upd('url')}/>
      <Txta label="案件本文・概要" required rows={5} value={f.description} onChange={upd('description')}/>
      <Inp label="総合スコア（0-100）" type="number" min="0" max="100" value={f.score} onChange={upd('score')} placeholder="未分析なら空欄"/>
      <Inp label="必要スキル（カンマ区切り）" value={f.required_skills} onChange={upd('required_skills')} placeholder="議事録作成, 文章整形"/>
      <Txta label="メモ" rows={3} value={f.memo} onChange={upd('memo')}/>
    </FullModal>
  );
}

// ─── OPPORTUNITY LIST ─────────────────────────────────────
function OpportunitiesScreen() {
  const { sb, user, nav } = useApp();
  const [opps, setOpps] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [group, setGroup] = useState('all');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('updated');
  const [showForm, setShowForm] = useState(false);

  const load = async () => {
    setLoading(true);
    const { data, error } = await sb.from('opportunities').select('*').eq('user_id', user.id).order('updated_at', { ascending: false });
    if (error) { setErr(error.message); } else { setOpps(data||[]); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const filtered = useMemo(() => {
    const g = STATUS_GROUPS.find(x=>x.key===group);
    let result = g?.statuses ? opps.filter(o=>g.statuses.includes(o.status)) : opps;
    if (search.trim()) {
      const q = search.toLowerCase();
      result = result.filter(o =>
        o.title.toLowerCase().includes(q) ||
        (o.description||'').toLowerCase().includes(q) ||
        (o.client_name||'').toLowerCase().includes(q) ||
        (o.category||'').toLowerCase().includes(q)
      );
    }
    if (sortKey === 'reward') result = [...result].sort((a,b) => b.reward_amount - a.reward_amount);
    else if (sortKey === 'deadline') result = [...result].sort((a,b) => {
      if (!a.deadline) return 1; if (!b.deadline) return -1;
      return a.deadline < b.deadline ? -1 : 1;
    });
    return result;
  }, [opps, group, search, sortKey]);

  if (loading) return <LoadingState/>;
  return (
    <>
      <PageHeader title="案件" subtitle={`${opps.length}件`}
        action={<Btn size="sm" onClick={()=>setShowForm(true)}><PlusIcon size={14}/> 追加</Btn>}/>
      {err && <ErrState error={err}/>}
      <div className="mb-3 flex gap-2">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="タイトル・クライアント・内容で検索"
          className={cn(inputCls,'flex-1')}/>
        <select value={sortKey} onChange={e=>setSortKey(e.target.value)}
          className="rounded-lg border border-slate-200 bg-white px-2 py-2.5 text-sm text-slate-600 focus:outline-none shrink-0">
          <option value="updated">更新順</option>
          <option value="reward">報酬高い順</option>
          <option value="deadline">納期近い順</option>
        </select>
      </div>
      <div className="mb-4 flex flex-wrap gap-2">
        {STATUS_GROUPS.map(g => {
          const cnt = g.statuses ? opps.filter(o=>g.statuses.includes(o.status)).length : opps.length;
          return (
            <button key={g.key} onClick={()=>setGroup(g.key)}
              className={cn('inline-flex items-center gap-1.5 rounded-full border px-3 py-1.5 text-sm font-medium transition-colors',
                group===g.key ? 'border-indigo-600 bg-indigo-600 text-white' : 'border-slate-200 bg-white text-slate-600')}>
              {g.label} <span className={cn('font-mono text-xs', group===g.key?'text-indigo-100':'text-slate-400')}>{cnt}</span>
            </button>
          );
        })}
      </div>
      {filtered.length === 0
        ? <EmptyState message="この区分の案件はありません"
            action={<Btn size="sm" variant="secondary" onClick={()=>setShowForm(true)}>案件を追加</Btn>}/>
        : (
          <div className="space-y-2.5">
            {filtered.map(opp => {
              const tone = STATUS_META[opp.status]?.tone || 'slate';
              const days = opp.deadline ? daysUntil(opp.deadline) : null;
              return (
                <button key={opp.id} onClick={()=>nav('oppDetail',{id:opp.id})}
                  className={cn('relative w-full overflow-hidden rounded-xl border border-slate-200 bg-white p-4 text-left transition-all hover:border-slate-300 hover:shadow-sm',
                    'before:absolute before:inset-y-0 before:left-0 before:w-1 before:content-[""]',
                    TONE_RAIL[tone])}>
                  <div className="pl-2">
                    <div className="mb-1.5 flex flex-wrap items-center gap-2">
                      <StatusBadge status={opp.status}/>
                      {days !== null && (
                        <span className={cn('font-mono text-xs', days<=3?'text-rose-500':'text-slate-400')}>
                          {deadlineLabel(opp.deadline)}
                        </span>
                      )}
                    </div>
                    <div className="truncate text-sm font-semibold text-slate-900">{opp.title}</div>
                    <div className="mt-2 flex items-center gap-3 text-xs text-slate-500">
                      <span>{SOURCE_META[opp.source]?.label}</span>
                      <span className="font-mono font-semibold text-slate-700">{fmtYen(opp.reward_amount)}</span>
                      {opp.score != null && <span className={cn('font-mono font-semibold', opp.score>=85?'text-emerald-600':opp.score>=70?'text-indigo-600':opp.score>=50?'text-amber-600':'text-slate-400')}>{opp.score}<span className="font-normal text-slate-400">/100</span></span>}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      {showForm && <OppForm onClose={()=>setShowForm(false)} onSaved={()=>{setShowForm(false);load();}}/>}
    </>
  );
}

// ─── SKILL SMART RUN ──────────────────────────────────────
// ─── SKILL MATCHING (local scoring) ───────────────────────
function tokenizeJa(text) {
  // 日本語向けの簡易トークン化：記号で分割しつつ2gramも生成
  const cleaned = (text||'').toLowerCase().replace(/[、。・，．\n\r\t/（）()「」\[\]｛｝【】！!?？:：;；]/g, ' ');
  const words = cleaned.split(/\s+/).filter(w => w.length >= 2);
  const grams = [];
  const compact = cleaned.replace(/\s+/g, '');
  for (let i = 0; i < compact.length - 1; i++) grams.push(compact.slice(i, i+2));
  return { words, grams: grams.filter(g => g.trim().length === 2) };
}
function scoreSkill(skill, input) {
  const inTok = tokenizeJa(input);
  const inSet = new Set([...inTok.words, ...inTok.grams]);
  // 重み：name > purpose > category > notes
  const fields = [
    { text: skill.name, w: 3.0 },
    { text: skill.purpose, w: 2.0 },
    { text: skill.category, w: 1.5 },
    { text: skill.notes, w: 1.0 },
    { text: skill.output_format, w: 0.8 },
  ];
  let score = 0;
  const hits = [];
  fields.forEach(f => {
    if (!f.text) return;
    const fTok = tokenizeJa(f.text);
    const fSet = new Set([...fTok.words, ...fTok.grams]);
    let fieldHit = 0;
    fSet.forEach(t => { if (inSet.has(t)) fieldHit++; });
    if (fieldHit > 0) {
      score += fieldHit * f.w;
      // 直接含有のボーナス（名前や用途に入力語がそのまま含まれる）
      inTok.words.forEach(w => { if ((f.text||'').toLowerCase().includes(w)) { score += f.w; hits.push(w); } });
    }
  });
  // 使用回数を軽く加点（実績のあるSkillを優先）
  score += Math.min(skill.usage_count || 0, 10) * 0.1;
  return { score, hits: [...new Set(hits)] };
}
function rankSkills(skills, input) {
  return skills
    .map(s => ({ skill: s, ...scoreSkill(s, input) }))
    .sort((a, b) => b.score - a.score);
}

function SkillSmartRun({ skills, onClose }) {
  const { sb, user } = useApp();
  const [source, setSource] = useState('');
  const [goal, setGoal] = useState('');
  const [ranked, setRanked] = useState(null);
  const [chosenId, setChosenId] = useState(null);
  const [prompt, setPrompt] = useState('');
  const [reply, setReply] = useState('');
  const [copied, setCopied] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const analyze = () => {
    if (!goal.trim()) return;
    const query = goal + ' ' + source;
    const r = rankSkills(skills, query);
    setRanked(r);
    setChosenId(r.length > 0 && r[0].score > 0 ? r[0].skill.id : null);
    setPrompt(''); setReply(''); setSaved(false);
  };

  const chosen = ranked && chosenId ? ranked.find(x => x.skill.id === chosenId) : null;
  const top = ranked && ranked.length > 0 ? ranked[0] : null;

  const buildReason = (entry) => {
    if (!entry) return '';
    const s = entry.skill;
    const matched = entry.hits.length > 0 ? `「${entry.hits.slice(0,4).join('・')}」との一致` : '用途の近さ';
    return `${matched}により、${s.category||'用途'}カテゴリの「${s.name}」が最も適合すると判断しました。${s.purpose ? '（用途：'+s.purpose+'）' : ''}`;
  };

  const generate = () => {
    if (!chosen) return;
    const s = chosen.skill;
    const tpl = s.prompt_template
      ? `## Skillテンプレート（${s.name}）\n${s.prompt_template}\n\n`
      : `## Skill: ${s.name}\n用途：${s.purpose||''}\n出力形式：${s.output_format||''}\n\n`;
    setPrompt(`${tpl}## 入力（やりたいこと）\n${goal}\n\n## 元テキスト\n${source||'（なし）'}\n\n## 依頼\n上記Skillに従って成果物を作成してください。出力の冒頭に「使用Skill：${s.name}」と記載してください。`);
  };

  const copy = async () => { try { await navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(()=>setCopied(false),1500); } catch(e){} };

  const save = async () => {
    if (!reply.trim() || !chosen) return;
    setSaving(true);
    const s = chosen.skill;
    await sb.from('skills').update({ usage_count: (s.usage_count||0)+1, last_used_at: localIso() }).eq('id', s.id).eq('user_id', user.id);
    await sb.from('knowledge_items').insert({ user_id: user.id, title: `Smart Run：${goal.slice(0,30)}`, category: 'general', content: `## やりたいこと\n${goal}\n\n## 元テキスト\n${source}\n\n## 使用Skill\n${s.name}\n\n## 出力\n${reply}`, tags: ['SmartRun', s.name], source_ref: 'Nexus Smart Run' });
    setSaving(false); setSaved(true);
  };

  return (
    <FullModal title="⚡ Smart Run" onClose={onClose}>
      <p className="rounded-lg bg-amber-50 border border-amber-100 p-3 text-xs leading-relaxed text-amber-700">
        やりたいことを入力すると、Nexusが登録済みSkillから最適なものを自動で選びます。選択理由を確認して、そのまま実行できます。
      </p>
      <Inp label="何を作りたいか" required value={goal} onChange={e=>{setGoal(e.target.value);setRanked(null);}}
        placeholder="例：飯島さんの面談内容を共有文にしたい / 数値の課題を分析したい"/>
      <Txta label="元テキスト（任意）" rows={5} value={source} onChange={e=>{setSource(e.target.value);setRanked(null);}}
        placeholder="共有したい文面・メモ・数値などがあれば貼り付け"/>
      <Btn variant="outline" onClick={analyze} disabled={!goal.trim()}><WandIcon size={14}/> 最適Skillを判定</Btn>

      {ranked && (
        ranked.length === 0 || !top || top.score === 0 ? (
          <ErrState error="一致するSkillが見つかりませんでした。Skillを登録するか、表現を変えてみてください。"/>
        ) : (
          <div className="space-y-3">
            {/* 自動選択結果 */}
            <div className="rounded-xl border border-indigo-200 bg-indigo-50 p-4">
              <div className="text-xs font-medium text-indigo-500">使用Skill（自動選択）</div>
              <div className="mt-0.5 text-base font-bold text-indigo-800">{chosen?.skill.name}</div>
              <div className="mt-2 text-xs font-medium text-indigo-500">選択理由</div>
              <div className="mt-0.5 text-sm text-slate-700">{buildReason(chosen)}</div>
            </div>

            {ranked.filter(r=>r.score>0).length > 1 && (
              <div>
                <div className="mb-1.5 text-xs text-slate-500">別のSkillに変更</div>
                <div className="flex flex-wrap gap-2">
                  {ranked.filter(r=>r.score>0).slice(0,3).map(r => (
                    <button key={r.skill.id} onClick={()=>{setChosenId(r.skill.id);setPrompt('');}}

          </div>

      {prompt && (
        <>
          <div className="rounded-xl border border-slate-200 bg-white p-3">
            <textarea readOnly value={prompt} rows={9} className="w-full rounded-lg border border-slate-100 bg-slate-50 p-3 font-mono text-xs leading-relaxed"/>

            placeholder="Claudeが生成した出力をここに貼り付けます"/>
          <div className="flex items-center justify-end gap-3">
            {saved && <span className="text-xs text-emerald-600">記録＋ナレッジ保存しました</span>}
            <Btn size="sm" disabled={!reply.trim()||saving} onClick={save}><SaveIcon size={14}/> 記録してナレッジ保存</Btn>
          </div>
        </>
      )}
    </FullModal>
  );
}

// ─── SKILL JSON HELPERS ───────────────────────────────────
function cleanJsonInput(raw) {
  let s = raw;
  // 1. 前後の空白・改行を除去
  s = s.trim();
  // 2. BOM・不可視文字・ゼロ幅スペースを除去
  s = s.replace(/^\uFEFF/, '').replace(/[\u200B\u200C\u200D\u00A0\u2060]/g, '');
  // 3. スマートクォート（Wordやメモ帳由来）を通常クォートに変換
  s = s.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
  // 4. ```json ... ``` または ``` ... ``` のMarkdownフェンスを除去（改行・スペースも含む）
  s = s.replace(/^```(?:json)?[\s\r\n]*/i, '').replace(/[\s\r\n]*```\s*$/, '');
  // 5. 再度trim
  s = s.trim();
  return s;
}
function getJsonErrDetail(cleaned, err) {
  const msg = err.message || '';
  // V8系: "at position 123" / JSC(Safari): "JSON Parse error: ..."
  const posMatch = msg.match(/position\s+(\d+)/i);
  if (posMatch) {
    const pos = parseInt(posMatch[1]);
    const before = cleaned.slice(0, pos);
    const line = (before.match(/\n/g) || []).length + 1;
    const col = before.length - before.lastIndexOf('\n');
    const near = cleaned.slice(Math.max(0, pos - 15), pos + 15).replace(/\n/g, '↵');
    return `${line}行目 ${col}文字目付近 → ...${near}...`;
  }
  return msg || '詳細不明';
}
function normalizeSkill(d, userId) {
  return {
    user_id: userId,
    name: d.name,
    category: d.category || '',
    scope: ['common','work_only','freelance_only'].includes(d.scope) ? d.scope : 'common',
    purpose: d.purpose || '',
    output_format: d.output_format || '',
    prompt_template: d.prompt_template || '',
    notes: d.notes || '',
    reusable_internally: d.reusable_internally !== false,
    usage_count: 0,
    last_used_at: null,
  };
}

function buildSkillBuilderPrompt(intent, categories) {
  const catList = categories.map(c=>c.name).join(' / ') || '分析 / 提案 / 成果物 / 連絡 / 社内業務';
  return `あなたはNexusのSkill設計アシスタントです。
以下の「やりたいこと」から、再利用可能なSkillを1つ設計してください。

# やりたいこと
${intent}

# 設計ルール
- categoryは次から選ぶか、適切な新カテゴリ名を作る: ${catList}
- scopeは common(本業副業共通) / work_only(本業専用) / freelance_only(副業専用) から選ぶ
- prompt_templateは、このSkillを実行するときにそのまま使える定型プロンプト本体にする（可変部分は{案件名}のように波括弧で示す）

# 出力
説明や前置きを書かず、以下のJSONのみを出力してください:
{
  "name": "Skill名",
  "category": "カテゴリ名",
  "scope": "common",
  "purpose": "用途・目的（1〜2文）",
  "output_format": "出力フォーマット",
  "prompt_template": "定型プロンプト本体",
  "notes": "使うときのコツ・注意点",
  "reusable_internally": true
}`;
}

function SkillBuilder({ categories, onClose, onSaved }) {
  const { sb, user } = useApp();
  const [intent, setIntent] = useState('');
  const [prompt, setPrompt] = useState('');
  const [copied, setCopied] = useState(false);
  const [reply, setReply] = useState('');
  const [parsed, setParsed] = useState(null);
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);

  const generate = () => { if (intent.trim()) setPrompt(buildSkillBuilderPrompt(intent, categories)); };
  const copy = async () => { try { await navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(()=>setCopied(false),1500);} catch(e){} };
  const doParse = () => {
    setErr('');
    const cleaned = cleanJsonInput(reply);
    try {
      let obj = JSON.parse(cleaned);
      if (Array.isArray(obj)) obj = obj[0];
      if (!obj || !obj.name) { setErr('nameが見つかりません。JSON部分（{ }）だけを貼り付けてください。'); return; }
      setParsed(obj);
    } catch(e) {
      setErr('JSONとして読み取れませんでした。\n' + getJsonErrDetail(cleaned, e));
    }
  };
  const save = async () => {
    setSaving(true);
    const { error } = await sb.from('skills').insert(normalizeSkill(parsed, user.id));
    setSaving(false);
    if (error) { setErr(error.message); return; }
    onSaved();
  };

  return (
    <FullModal title="Skill Builder" onClose={onClose} onSave={parsed ? save : null} saveLabel="保存して登録" saving={saving}>
      <p className="rounded-lg bg-indigo-50 p-3 text-xs leading-relaxed text-indigo-700">
        やりたいことを書く → プロンプト生成 → Claudeに貼る → 返ってきたJSONを下に貼り付け → 確認 → 保存
      </p>
      <Txta label="やりたいこと" rows={3} value={intent} onChange={e=>setIntent(e.target.value)}
        placeholder="例：教育共有を作りたい / 営業数値の分析をしたい / 提案書のたたきを作りたい"/>
      <Btn variant="outline" size="sm" onClick={generate} disabled={!intent.trim()}><WandIcon size={14}/> プロンプト生成</Btn>

      {prompt && (
        <div className="rounded-xl border border-slate-200 bg-white p-3">
          <textarea readOnly value={prompt} rows={7} className="w-full rounded-lg border border-slate-100 bg-slate-50 p-3 font-mono text-xs leading-relaxed"/>
          <div className="mt-2 flex justify-end">
            <Btn variant="secondary" size="sm" onClick={copy}>{copied?<><CheckIcon size={14}/> コピー済み</>:<><CopyIcon size={14}/> Claudeにコピー</>}</Btn>
          </div>
        </div>
      )}

      <Txta label="ClaudeのJSON回答を貼り付け" rows={6} value={reply} onChange={e=>{setReply(e.target.value);setParsed(null);}}
        placeholder='{ "name": "...", "category": "...", ... }'/>
      <Btn variant="outline" size="sm" onClick={doParse} disabled={!reply.trim()}>内容を確認</Btn>
      {err && <ErrState error={err}/>}

      {parsed && (
        <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-4 space-y-1.5">
          <div className="text-sm font-semibold text-emerald-800">プレビュー</div>
          <div className="text-sm"><span className="text-slate-500">名前：</span>{parsed.name}</div>
          <div className="text-sm"><span className="text-slate-500">カテゴリ：</span>{parsed.category||'未設定'} / <span className="text-slate-500">範囲：</span>{SCOPE_LABEL[parsed.scope]||'共通'}</div>
          {parsed.purpose && <div className="text-xs text-slate-600">{parsed.purpose}</div>}
          {parsed.prompt_template && <div className="text-xs text-emerald-700">📋 プロンプトテンプレートあり</div>}
          <div className="pt-1 text-xs text-emerald-700">右上「保存して登録」で追加されます</div>
        </div>
      )}
    </FullModal>
  );
}

function SkillImport({ onClose, onSaved }) {
  const { sb, user } = useApp();
  const [json, setJson] = useState('');
  const [list, setList] = useState(null);
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);

  const doParse = () => {
    setErr('');
    const cleaned = cleanJsonInput(json);
    try {
      let data = JSON.parse(cleaned);
      if (!Array.isArray(data)) data = [data];
      const valid = data.filter(d => d && d.name);
      if (valid.length === 0) { setErr('nameを持つSkillが見つかりませんでした。'); return; }
      setList(valid);
    } catch(e) {
      setErr('JSONとして読み取れませんでした。\n' + getJsonErrDetail(cleaned, e));
    }
  };
  const doImport = async () => {
    setSaving(true);
    const rows = list.map(d => normalizeSkill(d, user.id));
    const { error } = await sb.from('skills').insert(rows);
    setSaving(false);
    if (error) { setErr(error.message); return; }
    onSaved();
  };

  return (
    <FullModal title="JSONから一括登録" onClose={onClose} onSave={list ? doImport : null} saveLabel={list ? list.length+'件を登録' : '登録'} saving={saving}>
      <p className="text-xs leading-relaxed text-slate-500">ChatGPT等で作ったSkillのJSONを貼り付けてください。配列でも単体でも取り込めます。</p>
      <Txta label="Skill JSON" rows={9} value={json} onChange={e=>{setJson(e.target.value);setList(null);}}
        placeholder='[ { "name": "議事録作成", "category": "成果物", ... } ]'/>
      <Btn variant="outline" size="sm" onClick={doParse} disabled={!json.trim()}>内容を確認</Btn>
      {err && <ErrState error={err}/>}
      {list && (
        <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-4">
          <div className="mb-2 text-sm font-semibold text-emerald-800">{list.length}件のSkillを登録します</div>
          <div className="space-y-1 max-h-60 overflow-y-auto">
            {list.map((d,i)=><div key={i} className="text-sm text-slate-700">・{d.name} <span className="text-xs text-slate-400">{d.category||''}</span></div>)}
          </div>
        </div>
      )}
      <details className="rounded-xl border border-slate-200 bg-slate-50 p-3">
        <summary className="cursor-pointer text-xs font-medium text-slate-600">JSON形式の例を見る</summary>
        <pre className="mt-2 overflow-x-auto rounded bg-white p-2 font-mono text-[10px] leading-relaxed text-slate-600">{`[
  {
    "name": "議事録作成",
    "category": "成果物",
    "scope": "common",
    "purpose": "音声やメモから議事録を作る",
    "output_format": "決定事項とToDoを分けた議事録",
    "prompt_template": "以下の内容から議事録を作成してください...",
    "notes": "決定事項とToDoを必ず分ける",
    "reusable_internally": true
  }
]`}</pre>

function SkillsScreen() {
  const { sb, user, store, storeLoaded, fetchTable } = useApp();
  const skills = store.skills;
  const [categories, setCategories] = useState([]);
  const [catLoaded, setCatLoaded] = useState(false);
  const [err, setErr] = useState('');
  const [editing, setEditing] = useState(null);
  const [runningSkill, setRunningSkill] = useState(null);
  const [showMenu, setShowMenu] = useState(false);
  const [modal, setModal] = useState(null);
  const loading = !storeLoaded || !catLoaded;

  const load = async () => {
    await fetchTable('skills');
    const { data: c } = await sb.from('skill_categories').select('*').eq('user_id', user.id).order('sort_order');
    let cats = c||[];
    if (cats.length === 0) {
      const toInsert = SEED_CATEGORIES.map(d=>({ ...d, user_id: user.id }));
      const { data: seeded } = await sb.from('skill_categories').insert(toInsert).select();
      cats = seeded || SEED_CATEGORIES;
    }
    setCategories(cats);
    setCatLoaded(true);
  };
  useEffect(() => { load(); }, []);

  const del = async (id) => {
    if (!confirm('このSkillを削除しますか？')) return;
    await sb.from('skills').delete().eq('id', id).eq('user_id', user.id);
    load();
  };
  const duplicate = async (sk) => {
    const { id, created_at, updated_at, ...rest } = sk;
    await sb.from('skills').insert({ ...rest, name: sk.name+' (コピー)', usage_count: 0, last_used_at: null });
    load();
  };
  const recordUsage = async (sk) => {
    await sb.from('skills').update({ usage_count: (sk.usage_count||0)+1, last_used_at: localIso() }).eq('id', sk.id).eq('user_id', user.id);
    load();
  };
  const getCat = (name) => categories.find(c=>c.name===name) || { name: name||'未設定', tone:'slate' };

  if (loading) return <LoadingState/>;
  return (
    <>
      <PageHeader title="Skill" subtitle={`${skills.length}件 / 社内転用 ${skills.filter(s=>s.reusable_internally).length}件`}
        action={
          <div className="flex gap-2">
            <Btn variant="outline" size="sm" onClick={()=>setModal('smartrun')} title="Smart Run">⚡</Btn>
            <Btn size="sm" onClick={()=>setShowMenu(true)}><PlusIcon size={14}/> 追加</Btn>
          </div>
        }/>
      {err && <ErrState error={err}/>}
      {skills.length === 0
        ? <EmptyState message="まだSkillがありません" action={<Btn size="sm" variant="secondary" onClick={()=>setShowMenu(true)}>最初のSkillを登録</Btn>}/>
        : (
          <div className="grid gap-3 sm:grid-cols-2">
            {skills.map(sk => {
              const cat = getCat(sk.category);
              return (
                <div key={sk.id} className="rounded-xl border border-slate-200 bg-white p-4 flex flex-col gap-2">
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex flex-wrap gap-1.5">
                      <Badge tone={cat.tone}>{cat.name}</Badge>
                      <Badge tone={SCOPE_TONE[sk.scope]||'slate'}>{SCOPE_LABEL[sk.scope]||'共通'}</Badge>
                      {sk.reusable_internally && <Badge tone="amber"><Repeat2Icon size={11} className="mr-0.5"/>社内</Badge>}
                    </div>
                    <div className="flex gap-1 shrink-0">
                      <button onClick={()=>setRunningSkill(sk)} title="実行" className="rounded p-1 text-slate-400 hover:bg-amber-50 hover:text-amber-600"><PlayIcon size={14}/></button>
                      <button onClick={()=>recordUsage(sk)} title="使用を記録（✓）" className="rounded p-1 text-slate-400 hover:bg-emerald-50 hover:text-emerald-600"><CheckIcon size={14}/></button>
                      <button onClick={()=>duplicate(sk)} title="複製" className="rounded p-1 text-slate-400 hover:bg-indigo-50 hover:text-indigo-600"><Repeat2Icon size={14}/></button>
                      <button onClick={()=>{setEditing(sk);setModal('manual');}} className="rounded p-1 text-slate-400 hover:bg-slate-100"><EditIcon size={14}/></button>
                      <button onClick={()=>del(sk.id)} className="rounded p-1 text-slate-400 hover:bg-rose-50 hover:text-rose-500"><TrashIcon size={14}/></button>
                    </div>
                  </div>
                  <div className="text-sm font-semibold text-slate-900">{sk.name}</div>
                  {sk.purpose && <p className="line-clamp-2 text-xs text-slate-500">{sk.purpose}</p>}
                  {sk.prompt_template && <p className="rounded bg-indigo-50 px-2 py-1 text-xs text-indigo-600">📋 テンプレートあり</p>}
                  <div className="mt-auto flex items-center justify-between border-t border-slate-100 pt-2.5 text-xs text-slate-400">
                    <span>使用 <span className="font-mono font-semibold text-slate-600">{sk.usage_count||0}</span>回</span>
                    <span className="font-mono">最終 {fmtDate(sk.last_used_at)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      {showMenu && <SkillActionMenu onClose={()=>setShowMenu(false)} onPick={(k)=>{setShowMenu(false); if(k==='manual'){setEditing(null);} setModal(k);}}/>}
      {modal==='smartrun' && <SkillSmartRun skills={skills} onClose={()=>setModal(null)}/>}
      {modal==='manual' && <SkillForm initial={editing} categories={categories} onClose={()=>{setModal(null);setEditing(null);}} onSaved={()=>{setModal(null);setEditing(null);load();}}/>}
      {modal==='builder' && <SkillBuilder categories={categories} onClose={()=>setModal(null)} onSaved={()=>{setModal(null);load();}}/>}
      {modal==='import' && <SkillImport onClose={()=>setModal(null)} onSaved={()=>{setModal(null);load();}}/>}
      {modal==='export' && <SkillExport onClose={()=>setModal(null)}/>}
      {modal==='incubator' && <SkillIncubator onClose={()=>setModal(null)}/>}
      {modal==='category' && <SkillCategoryManager onClose={()=>{setModal(null);load();}}/>}
      {runningSkill && <SkillRunner skill={runningSkill} onClose={()=>setRunningSkill(null)}/>}
    </>
  );
}

const KW_DEFAULTS = { title:'', category:'general', content:'', tags:'', source_ref:'' };

function KnowledgeForm({ initial, onClose, onSaved }) {
  const { sb, user } = useApp();
  const [f, setF] = useState(initial ? { ...initial, tags:(initial.tags||[]).join(', ') } : { ...KW_DEFAULTS });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const upd = k => e => setF(v=>({...v,[k]:e.target.value}));

  const save = async () => {
    if (!f.title.trim()) { setErr('タイトルを入力してください'); return; }
    setSaving(true);
    const payload = { ...f, user_id: user.id, tags: f.tags ? f.tags.split(',').map(s=>s.trim()).filter(Boolean) : [] };
    let error;
    if (f.id) {
      ({ error } = await sb.from('knowledge_items').update(payload).eq('id', f.id).eq('user_id', user.id));
    } else {
      ({ error } = await sb.from('knowledge_items').insert(payload));
    }
    setSaving(false);
    if (error) { setErr(error.message); return; }
    onSaved();
  };

  return (
    <FullModal title={f.id ? 'ナレッジを編集' : 'ナレッジを追加'} onClose={onClose} onSave={save} saving={saving}>
      {err && <ErrState error={err}/>}
      <Inp label="タイトル" required value={f.title} onChange={upd('title')} placeholder="ナレッジのタイトル"/>
      <Sel label="カテゴリ" value={f.category} onChange={upd('category')}>
        {KNOWLEDGE_CATEGORIES.map(k=><option key={k} value={k}>{KNOWLEDGE_CATEGORY_LABELS[k]}</option>)}
      </Sel>
      <Txta label="内容" rows={8} value={f.content} onChange={upd('content')} placeholder="気づき・手順・テンプレートなどを自由に記録"/>
      <Inp label="タグ（カンマ区切り）" value={f.tags} onChange={upd('tags')} placeholder="提案文, CW, 議事録"/>
      <Inp label="参考元（URL/書名など）" value={f.source_ref} onChange={upd('source_ref')}/>
    </FullModal>
  );
}

function generateSearchUrl(source, condition) {
  if (!source) return '';
  const tpl = source.search_url_template;
  if (!tpl) return source.base_url || '';
  const kw = encodeURIComponent(((condition && condition.keywords) || '').trim());
  return tpl
    .replace('{keywords}', kw)
    .replace('{min_reward}', (condition && condition.min_reward) || 0)
    .replace('{category}', encodeURIComponent((condition && condition.category) || ''));
}
function getRecommendMeta(score) {
  if (score === null || score === undefined) return { label:'未評価', tone:'slate' };
  if (score >= 80) return { label:'応募優先',  tone:'emerald' };
  if (score >= 60) return { label:'条件付き',  tone:'indigo' };
  if (score >= 40) return { label:'要注意',    tone:'amber' };
  return                   { label:'見送り推奨', tone:'rose' };
}
function computeRecommendScore(fitScore, riskScore, reward) {
  const base = 50;
  const rewardBonus = reward >= 50000 ? 15 : reward >= 30000 ? 10 : reward >= 10000 ? 5 : 0;
  const fit = (fitScore || 0);
  const risk = (riskScore || 0);
  return Math.max(0, Math.min(100, base + rewardBonus + fit - risk));
}
function buildDuplicateKey(title, clientName) {
  return ((title || '') + (clientName || '')).replace(/\s/g, '').toLowerCase().slice(0, 60);
}
function checkDuplicates(existing, newTitle, newUrl, newClient) {
  const dups = [];
  const key = buildDuplicateKey(newTitle, newClient);
  existing.forEach(c => {
    if (newUrl && c.url && c.url === newUrl) { dups.push({ id: c.id, title: c.title, reason: 'URL一致' }); return; }
    if (c.duplicate_key && c.duplicate_key === key) { dups.push({ id: c.id, title: c.title, reason: '案件名・クライアント一致' }); return; }
    if (newTitle && c.title && newTitle.length > 5 && c.title.includes(newTitle.slice(0, 10))) { dups.push({ id: c.id, title: c.title, reason: '案件名が類似' }); }
  });
  return dups;
}

    risk: `## 依頼内容
この案件のリスクを洗い出してください。
1. クライアントリスク（要求の不明確さ、低評価等）
2. スコープリスク（作業範囲の膨張リスク）
3. 納期リスク
4. 報酬リスク（未払い・値下げ交渉等）
5. 総合リスク評価（高・中・低）`,

    proposal: `## 依頼内容

構成：挨拶→案件理解→対応できる理由→具体的な進め方→納期目安→修正対応可否→締め
コピペしてそのまま送れる形式でお願いします。`,

  };

function JobAnalysisBridge({ kind, candidate, skills, onAnalysisSaved }) {
  const { sb, user } = useApp();
  const [prompt, setPrompt] = useState('');
  const [reply, setReply] = useState('');
  const [copied, setCopied] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  const generate = () => setPrompt(buildJobAnalysisPrompt(kind, candidate, skills));
  const copy = async () => { try { await navigator.clipboard.writeText(prompt); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch(e){} };
  const save = async () => {
    if (!reply.trim()) return;
    setSaving(true);
    const updates = { updated_at: new Date().toISOString() };
    if (kind === 'analysis') updates.analysis = reply;
    if (kind === 'proposal') updates.proposal = reply;
    if (kind === 'decision') updates.application_decision = reply;
    await sb.from('job_candidates').update(updates).eq('id', candidate.id).eq('user_id', user.id);
    setSaving(false); setSaved(true);
    if (onAnalysisSaved) onAnalysisSaved(kind, reply);
  };

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <span className="text-sm font-medium text-slate-700">{JOB_ANALYSIS_KINDS[kind]}</span>
        <Btn variant="outline" size="sm" onClick={generate}><WandIcon size={14}/> 生成</Btn>
      </div>
      {prompt && (
        <div className="rounded-xl border border-slate-200 bg-white p-3">
          <textarea readOnly value={prompt} rows={7} className="w-full rounded-lg border border-slate-100 bg-slate-50 p-3 font-mono text-xs leading-relaxed"/>
          <div className="mt-2 flex justify-end">
            <Btn variant="secondary" size="sm" onClick={copy}>{copied ? <><CheckIcon size={14}/> コピー済み</> : <><CopyIcon size={14}/> Claudeにコピー</>}</Btn>
          </div>
        </div>
      )}
      <Txta label="Claudeの回答を貼り付け" rows={5} value={reply} onChange={e => { setReply(e.target.value); setSaved(false); }} placeholder="Claudeの分析結果をここに貼り付けます"/>
      <div className="flex items-center justify-end gap-3">

}

function JobCandidateForm({ sourceId, conditionId, sources, onClose, onSaved }) {
  const { sb, user } = useApp();
  const [rawText, setRawText] = useState('');
  const [f, setF] = useState({ title:'', platform:'', url:'', client_name:'', reward:0, deadline:'', description:'', requirements:'', deliverable:'', concerns:'' });
  const [dups, setDups] = useState([]);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const upd = k => e => setF(v => ({ ...v, [k]: e.target.value }));
  const src = sources.find(s => s.id === sourceId);

  const checkDups = async () => {
    const { data } = await sb.from('job_candidates').select('id,title,url,duplicate_key').eq('user_id', user.id).eq('source_id', sourceId).limit(200);
    if (data) setDups(checkDuplicates(data, f.title, f.url, f.client_name));
  };

  const save = async () => {
    if (!f.title.trim()) { setErr('案件名を入力してください'); return; }
    setSaving(true);
    await checkDups();
    const recScore = computeRecommendScore(null, null, parseInt(f.reward) || 0);
    const payload = {
      ...f, user_id: user.id,
      source_id: sourceId || null,
      search_condition_id: conditionId || null,
      platform: src ? src.name : f.platform,
      reward: parseInt(f.reward) || 0,
      raw_text: rawText,
      status: 'candidate',
      recommend_score: recScore,
      duplicate_key: buildDuplicateKey(f.title, f.client_name),
    };
    const { error } = await sb.from('job_candidates').insert(payload);
    setSaving(false);
    if (error) { setErr(error.message); return; }
    onSaved();
  };

  return (
    <FullModal title="案件を登録" onClose={onClose} onSave={save} saving={saving} saveLabel="候補として保存">
      {err && <ErrState error={err}/>}
      {dups.length > 0 && (
        <div className="rounded-lg bg-amber-50 border border-amber-200 p-3">
          <div className="text-xs font-medium text-amber-700">類似案件が登録済みです</div>
          {dups.map((d, i) => <div key={i} className="text-xs text-amber-600">{d.reason}：{d.title}</div>)}
        </div>
      )}
      <Txta label="元の案件文を貼り付け（案件サイトからコピー）" rows={8} value={rawText} onChange={e => setRawText(e.target.value)} placeholder="案件ページの本文をそのままここに貼り付けてください"/>

        <p className="text-xs font-medium text-slate-600">案件情報（手動入力・必要な項目だけでOK）</p>
        <Inp label="案件名" required value={f.title} onChange={upd('title')} placeholder="【在宅】議事録作成のお仕事"/>
        <div className="grid grid-cols-2 gap-3">

function JobCandidateListScreen() {
  const { sb, user, nav } = useApp();
  const [candidates, setCandidates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    const load = async () => {
      const { data } = await sb.from('job_candidates').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
      setCandidates(data || []);
      setLoading(false);
    };
    load();
  }, []);

  const FILTER_GROUPS = [
    { key:'all',      label:'すべて',   statuses: null },
    { key:'active',   label:'検討中',   statuses: ['candidate','analyzing','apply_cand','to_apply'] },
    { key:'applied',  label:'応募済み', statuses: ['applied','won','working','delivered','done'] },
    { key:'declined', label:'見送り',   statuses: ['declined'] },
  ];

  const filtered = useMemo(() => {
    const g = FILTER_GROUPS.find(x => x.key === filter);
    return g && g.statuses ? candidates.filter(c => g.statuses.includes(c.status)) : candidates;
  }, [candidates, filter]);

  if (loading) return <LoadingState/>;
  return (
    <>
      <PageHeader title="案件候補" subtitle={`${candidates.length}件`}
        action={<Btn size="sm" onClick={() => nav('searchExplore')}><PlusIcon size={14}/> 探索する</Btn>}/>
      <div className="mb-4 flex flex-wrap gap-2">
        {FILTER_GROUPS.map(g => {
          const cnt = g.statuses ? candidates.filter(c => g.statuses.includes(c.status)).length : candidates.length;
          return (
            <button key={g.key} onClick={() => setFilter(g.key)}
              className={cn('inline-flex items-center gap-1.5 rounded-full border px-3 py-1.5 text-sm font-medium transition-colors',
                filter === g.key ? 'border-indigo-600 bg-indigo-600 text-white' : 'border-slate-200 bg-white text-slate-600')}>
              {g.label}<span className={cn('font-mono text-xs', filter === g.key ? 'text-indigo-100' : 'text-slate-400')}>{cnt}</span>
            </button>
          );
        })}
      </div>
      {filtered.length === 0
        ? <EmptyState message="案件候補がありません" action={<Btn size="sm" variant="secondary" onClick={() => nav('searchExplore')}>案件を探す</Btn>}/>
        : (
          <div className="space-y-2.5">
            {filtered.map(c => {
              const rec = getRecommendMeta(c.recommend_score);
              const st = JOB_STATUS_META[c.status] || { label: c.status, tone: 'slate' };
              return (
                <button key={c.id} onClick={() => nav('candidateDetail', { id: c.id })}
                  className="w-full rounded-xl border border-slate-200 bg-white p-4 text-left hover:border-slate-300 hover:shadow-sm transition-all">
                  <div className="mb-1.5 flex flex-wrap items-center gap-2">
                    <Badge tone={st.tone}>{st.label}</Badge>
                    <Badge tone={rec.tone}>{rec.label}</Badge>
                    <span className="text-xs text-slate-400">{c.platform}</span>
                  </div>
                  <div className="truncate text-sm font-semibold text-slate-900">{c.title}</div>
                  <div className="mt-1.5 flex items-center gap-4 text-xs text-slate-500">
                    <span className="font-mono font-semibold text-slate-700">{fmtYen(c.reward)}</span>
                    {c.deadline && <span>納期：{c.deadline}</span>}
                    {c.recommend_score != null && <span className="font-mono">{c.recommend_score}点</span>}
                  </div>
                </button>
              );
            })}
          </div>
        )}
    </>
  );
}

function JobCandidateDetailScreen({ id }) {
  const { sb, user, nav, back } = useApp();
  const [candidate, setCandidate] = useState(null);
  const [skills, setSkills] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('analysis');
  const [fitScore, setFitScore] = useState(0);
  const [riskScore, setRiskScore] = useState(0);
  const [savingScore, setSavingScore] = useState(false);
  const [registering, setRegistering] = useState(false);
  const tabs = [
    { key:'analysis', label:'分析' },
    { key:'decision', label:'応募判断' },
    { key:'risk',     label:'リスク' },
    { key:'proposal', label:'提案文' },
    { key:'question', label:'質問文' },
    { key:'estimate', label:'見積もり' },
  ];

  const load = async () => {
    const [{ data: c }, { data: s }] = await Promise.all([
      sb.from('job_candidates').select('*').eq('id', id).single(),
      sb.from('skills').select('*').eq('user_id', user.id).order('usage_count', { ascending: false }),
    ]);
    setCandidate(c);
    setFitScore(c?.fit_score || 0);
    setRiskScore(c?.risk_score || 0);
    setSkills(s || []);
    setLoading(false);
  };
  useEffect(() => { load(); }, [id]);

  const updateStatus = async (status) => {
    await sb.from('job_candidates').update({ status }).eq('id', id).eq('user_id', user.id);
    setCandidate(v => ({ ...v, status }));
  };

  const saveScore = async () => {
    setSavingScore(true);
    const rec = computeRecommendScore(fitScore, riskScore, candidate?.reward || 0);
    await sb.from('job_candidates').update({ fit_score: fitScore, risk_score: riskScore, recommend_score: rec }).eq('id', id).eq('user_id', user.id);
    setCandidate(v => ({ ...v, fit_score: fitScore, risk_score: riskScore, recommend_score: rec }));
    setSavingScore(false);
  };

  const registerToOpps = async () => {
    if (!confirm('この案件を案件管理へ登録しますか？')) return;
    setRegistering(true);
    const c = candidate;
    await sb.from('opportunities').insert({
      user_id: user.id, title: c.title, source: 'other', url: c.url || null,
      client_name: c.client_name || null, description: c.raw_text || c.description || '',
      reward_amount: c.reward || 0, deadline: null, category: c.platform || '',
      status: 'candidate', score: c.recommend_score || null, memo: `案件候補から登録（${new Date().toLocaleDateString('ja-JP')}）`,
      required_skills: [], visibility: 'private',
    });
    await updateStatus('applied');
    setRegistering(false);
    alert('案件管理に登録しました。案件タブから確認できます。');
  };

  if (loading) return <LoadingState/>;
  if (!candidate) return <ErrState error="案件候補が見つかりませんでした"/>;

  const rec = getRecommendMeta(candidate.recommend_score);
  const st = JOB_STATUS_META[candidate.status] || { label: candidate.status, tone: 'slate' };

  return (
    <>
      <PageHeader title={candidate.title} onBack={back}/>

      <div className="mb-5 rounded-xl border border-slate-200 bg-white p-4 space-y-4">
        <div className="flex flex-wrap items-center gap-2">
          <Badge tone={st.tone}>{st.label}</Badge>

          <span className="text-xs text-slate-400">{candidate.platform}</span>
        </div>
        <div className="grid grid-cols-2 gap-3">
          {[
            { label:'報酬', value: <span className="font-mono font-semibold">{fmtYen(candidate.reward)}</span> },
            { label:'納期', value: candidate.deadline || '—' },
            { label:'クライアント', value: candidate.client_name || '—' },
            { label:'登録日', value: fmtDate(candidate.created_at) },
          ].map(item => (
            <div key={item.label}>
              <div className="text-xs text-slate-400">{item.label}</div>
              <div className="mt-0.5 text-sm text-slate-800">{item.value}</div>
            </div>
          ))}
        </div>
        {candidate.url && <a href={candidate.url} target="_blank" rel="noopener noreferrer" className="text-xs text-indigo-600">元の案件ページを開く →</a>}
        {candidate.raw_text && (
          <details className="rounded-lg border border-slate-100">
            <summary className="cursor-pointer p-2 text-xs font-medium text-slate-600">元の案件文を見る</summary>
            <pre className="whitespace-pre-wrap p-3 font-sans text-xs leading-relaxed text-slate-600">{candidate.raw_text}</pre>
          </details>
        )}
        {candidate.concerns && <div className="rounded-md bg-amber-50 p-2 text-xs text-amber-700">気になる点：{candidate.concerns}</div>}

// ─── SKILL-BASED JOB FINDER ───────────────────────────────
// ジャンル定義：各ジャンルのマッチ用キーワードと、検索に使う標準キーワード
const JOB_GENRES = [
  {
    key: 'minutes', name: '議事録・文章整理系',
    match: ['議事録','文字起こし','要約','文章整理','リライト','校正','共有文','ライティング'],
    searchKeywords: ['議事録','文字起こし','要約','文章整理'],
  },
  {
    key: 'docs', name: '資料作成系',
    match: ['資料','powerpoint','パワポ','スライド','営業資料','提案書','企画書','マニュアル','教育資料','研修','ドキュメント'],
    searchKeywords: ['資料作成','提案書','企画書','マニュアル'],
  },
  {
    key: 'ai', name: 'AI活用系',
    match: ['ai','chatgpt','claude','生成ai','プロンプト','業務効率化','自動化','gpt'],
    searchKeywords: ['ChatGPT','AI活用','プロンプト','業務効率化'],
  },
  {
    key: 'sales', name: '営業支援系',
    match: ['営業','セールス','トーク','提案','商談','営業企画','営業資料','顧客'],
    searchKeywords: ['営業支援','営業資料','営業企画'],
  },
  {
    key: 'improve', name: '業務改善系',
    match: ['業務改善','仕組み化','マニュアル','業務フロー','効率化','オペレーション','改善','標準化'],
    searchKeywords: ['業務改善','仕組み化','業務フロー','効率化'],
  },
];

// Skill群からジャンルごとのマッチSkillとキーワードをローカルでAPIなしに算出
function buildGenreGroups(skills, sources) {
  const text = (s) => `${s.name||''} ${s.purpose||''} ${s.notes||''} ${s.category||''}`.toLowerCase();
  return JOB_GENRES.map(genre => {
    const matchedSkills = skills.filter(s => {
      const t = text(s);
      return genre.match.some(kw => t.includes(kw.toLowerCase()));
    });
    // Skillのnameから固有キーワードを補強（重複除去）
    const extra = [];
    matchedSkills.forEach(s => {
      const nm = (s.name||'').replace(/本橋式|作成|の|する/g, '').trim();
      if (nm && nm.length >= 2 && !genre.searchKeywords.includes(nm)) extra.push(nm);
    });
    const keywords = [...genre.searchKeywords, ...extra.slice(0, 2)];
    // おすすめ度：マッチSkill数 + 副業可Skillの存在で加点
    const freelanceMatch = matchedSkills.filter(s => s.scope !== 'work_only').length;
    const score = Math.min(100, matchedSkills.length * 20 + freelanceMatch * 10);
    return { ...genre, matchedSkills, keywords, score };
  }).filter(g => g.matchedSkills.length >= 2 && g.score >= 20)
    .sort((a, b) => b.score - a.score)
    .slice(0, 4);
}

// 主要3媒体の検索URLを生成（マスタのsearch_url_templateを使用、なければトップ）
function genreSearchUrls(sources, keywords) {
  const kw = encodeURIComponent(keywords.join(' '));
  const targets = ['クラウドワークス','ランサーズ','ココナラ'];
  return targets.map(name => {
    const src = sources.find(s => s.name === name);
    let url = '';
    if (src && src.search_url_template) url = src.search_url_template.replace('{keywords}', kw).replace('{min_reward}','0').replace('{category}','');
    else if (src && src.base_url) url = src.base_url;
    return { name, url, short: name === 'クラウドワークス' ? 'CW' : name === 'ランサーズ' ? 'ランサーズ' : 'ココナラ' };
  });
}

function GenreSearchCard({ genre: g, sources }) {
  const [selectedKw, setSelectedKw] = React.useState(g.keywords[0] || '');
  const [copied, setCopied] = React.useState('');

  const open = async (src, srcName) => {
    if (!src) return;
    try { await navigator.clipboard.writeText(selectedKw); setCopied(srcName); setTimeout(() => setCopied(''), 3000); } catch(e){}
    const tpl = src.search_url_template;
    const url = tpl
      ? tpl.replace('{keywords}', encodeURIComponent(selectedKw)).replace('{min_reward}','0').replace('{category}','')
      : src.base_url || '';
    if (url) window.open(url, '_blank');
  };

  const targets = ['クラウドワークス','ランサーズ','ココナラ'];
  const rec = g.score >= 60 ? { label:'おすすめ', tone:'emerald' } : g.score >= 30 ? { label:'適合', tone:'indigo' } : { label:'関連', tone:'slate' };

  return (
    <div className="rounded-xl border border-slate-200 bg-white p-4">
      <div className="mb-3 flex items-center justify-between gap-2">
        <span className="text-sm font-semibold text-slate-900">{g.name}</span>
        <Badge tone={rec.tone}>{rec.label}</Badge>
      </div>
      <p className="mb-2 text-xs text-slate-400">キーワードを1つ選ぶ：</p>
      <div className="mb-3 flex flex-wrap gap-1.5">
        {g.keywords.map(k => (
          <button key={k} onClick={() => setSelectedKw(k)}
            className={cn('rounded-full border px-3 py-1 text-xs font-medium transition-colors',
              selectedKw === k
                ? 'border-indigo-600 bg-indigo-600 text-white'
                : 'border-slate-200 bg-slate-50 text-slate-600 hover:border-indigo-300')}>
            {k}
          </button>
        ))}
      </div>
      <div className="mb-1 text-xs text-slate-400">選択中：<span className="font-medium text-indigo-600">{selectedKw}</span> で検索</div>
      <div className="grid grid-cols-3 gap-2 mt-2">
        {targets.map(name => {
          const src = sources.find(s => s.name === name);
          const short = name === 'クラウドワークス' ? 'CW' : name;
          return (
            <button key={name} onClick={() => open(src, name)} disabled={!src}
              className={cn("rounded-lg border py-2 text-xs font-medium transition-colors disabled:opacity-40",
                copied === name
                  ? "border-emerald-400 bg-emerald-50 text-emerald-700"
                  : "border-slate-200 bg-white text-slate-700 hover:border-indigo-300 hover:bg-indigo-50")}>
              {copied === name ? '✓ コピー済み' : short}
            </button>
          );
        })}
      </div>
      {copied && <p className="mt-2 text-xs text-emerald-600">「{selectedKw}」をコピーしました。検索ボックスに長押し→ペーストで検索できます</p>}
      <p className="mt-1 text-xs text-slate-400">マッチSkill：{g.matchedSkills.slice(0,3).map(s => s.name).join('・')}{g.matchedSkills.length > 3 ? '…' : ''}</p>
    </div>
  );
}

function CopyKeywordRow({ keywords }) {

    <div className="mb-2 flex items-center gap-2 rounded-lg bg-slate-50 px-3 py-2">

      </button>
    </div>

}

function SkillBasedFinder({ skills, sources, onClose, onPaste }) {
  const groups = useMemo(() => buildGenreGroups(skills, sources), [skills, sources]);

  return (
    <FullModal title="登録Skillから案件を探す" onClose={onClose}>
      <p className="rounded-lg bg-indigo-50 p-3 text-xs leading-relaxed text-indigo-700">

        <EmptyState message="マッチするSkillがありません。先にSkillを登録してください。"/>
      ) : (
        <div className="space-y-4">
          {groups.map(g => <GenreSearchCard key={g.key} genre={g} sources={sources}/>)}

}

// ─── STAFF (RELATIONSHIP LAYER) ───────────────────────────
function daysSince(iso) {
  if (!iso) return null;
  const d = new Date(iso); d.setHours(0,0,0,0);
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((t - d) / 86400000);
}
function gapBadge(label, iso, threshold) {
  const n = daysSince(iso);
  if (n === null) return <Badge tone="slate">{label}未記録</Badge>;
  if (n >= threshold) return <Badge tone="amber">{label}{n}日空き</Badge>;
  return <Badge tone="emerald">{label}{n === 0 ? '本日' : n + '日前'}</Badge>;
}

function normalizeStaff(d, userId) {
  // 配列でも文字列でも受け取り、改行区切り文字列に正規化
  const arr = (v) => Array.isArray(v) ? v.filter(Boolean).join('\n') : (v || '');
  // フィールド名の揺れを吸収
  return {
    user_id: userId,
    name: d.name || '',
    role: d.role || '',
    department: d.department || '',
    strengths: arr(d.strengths),
    challenges: arr(d.challenges),
    resonant_approach: arr(d.resonant_approach || d.effective_approach),
    ng_approach: arr(d.ng_approach || d.avoid_approach),
    goals: arr(d.goals),
    current_situation: d.current_situation || d.current_status || '',
    notes: d.notes || '',
    last_education_at: d.last_education_at || d.last_education || d.実施日_教育 || null,
    last_interview_at: d.last_interview_at || d.last_interview || d.実施日_面談 || null,
    next_education_at: d.next_education_at || null,
    next_interview_at: d.next_interview_at || null,
    is_active: d.is_active !== false,
  };
}

function StaffImport({ existing, onClose, onSaved }) {
  const { sb, user } = useApp();
  const [json, setJson] = useState('');
  const [list, setList] = useState(null);
  const [err, setErr] = useState('');
  const [mode, setMode] = useState('overwrite'); // overwrite | merge | skip
  const [saving, setSaving] = useState(false);
  const fileRef = useRef(null);

  const existingByName = useMemo(() => {
    const m = {};
    (existing || []).forEach(s => { m[s.name] = s; });
    return m;
  }, [existing]);

  const onFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { setJson(String(reader.result || '')); setList(null); };
    reader.readAsText(file);
  };

  const doParse = () => {
    setErr('');
    const cleaned = cleanJsonInput(json);
    try {
      let data = JSON.parse(cleaned);
      if (!Array.isArray(data)) data = [data];
      const valid = data.filter(d => d && d.name);
      if (valid.length === 0) { setErr('nameを持つスタッフが見つかりませんでした。'); return; }
      setList(valid);
    } catch(e) {
      setErr('JSONとして読み取れませんでした。\n' + getJsonErrDetail(cleaned, e));
    }
  };

  const doImport = async () => {
    setSaving(true);
    let inserted = 0, updated = 0, skipped = 0;
    for (const raw of list) {
      const norm = normalizeStaff(raw, user.id);
      const exist = existingByName[norm.name];
      if (exist) {
        if (mode === 'skip') { skipped++; continue; }
        if (mode === 'merge') {
          // 既存に値があるフィールドは残し、空のフィールドだけ埋める
          const patch = {};
          Object.keys(norm).forEach(k => {
            if (k === 'user_id' || k === 'name') return;
            const cur = exist[k];
            const isEmpty = cur === null || cur === undefined || cur === '';
            if (isEmpty && norm[k]) patch[k] = norm[k];
          });
          if (Object.keys(patch).length > 0) {
            await sb.from('staff_profiles').update(patch).eq('id', exist.id).eq('user_id', user.id);
          }
          updated++;
        } else {
          // overwrite
          const { user_id, ...rest } = norm;
          await sb.from('staff_profiles').update(rest).eq('id', exist.id).eq('user_id', user.id);
          updated++;
        }
      } else {
        await sb.from('staff_profiles').insert(norm);
        inserted++;
      }
    }
    setSaving(false);
    alert(`取込完了：新規${inserted}件 / 更新${updated}件 / スキップ${skipped}件`);
    onSaved();
  };

  const dupNames = list ? list.filter(d => existingByName[d.name]).map(d => d.name) : [];

  return (
    <FullModal title="スタッフJSONインポート" onClose={onClose} onSave={list ? doImport : null}
      saveLabel={list ? list.length+'件を取込' : '取込'} saving={saving}>
      <p className="text-xs leading-relaxed text-slate-500">
        ChatGPT等で作ったスタッフJSONを貼り付けるか、ファイルを選択してください。strengthsなどは配列でも文字列でもOKです。
      </p>

      <div className="flex gap-2">
        <input ref={fileRef} type="file" accept=".json,application/json" onChange={onFile} className="hidden"/>
        <Btn variant="outline" size="sm" onClick={()=>fileRef.current?.click()}>📁 ファイルを選択</Btn>
      </div>

      <Txta label="スタッフ JSON" rows={9} value={json} onChange={e=>{setJson(e.target.value);setList(null);}}
        placeholder='[ { "name": "黒田くん", "role": "スタッフ", "strengths": ["優しい"], ... } ]'/>
      <Btn variant="outline" size="sm" onClick={doParse} disabled={!json.trim()}>内容を確認</Btn>
      {err && <ErrState error={err}/>}

      {list && (
        <>
          <div className="rounded-xl border border-emerald-200 bg-emerald-50 p-4">
            <div className="mb-2 text-sm font-semibold text-emerald-800">{list.length}名を取り込みます</div>
            <div className="space-y-1 max-h-52 overflow-y-auto">
              {list.map((d,i)=>(
                <div key={i} className="text-sm text-slate-700">
                  ・{d.name} <span className="text-xs text-slate-400">{d.role||''}</span>
                  {existingByName[d.name] && <span className="ml-1 text-xs text-amber-600">（既存）</span>}
                </div>
              ))}
            </div>
          </div>

          {dupNames.length > 0 && (
            <div className="rounded-xl border border-amber-200 bg-amber-50 p-3 space-y-2">
              <div className="text-xs font-semibold text-amber-700">同名スタッフが{dupNames.length}名います。扱いを選択：</div>
              <div className="flex flex-col gap-1.5">
                {[
                  { k:'overwrite', label:'上書き（JSONの内容で完全に置き換える）' },
                  { k:'merge',     label:'差分更新（空欄だけ埋める。既存の情報は残す）' },
                  { k:'skip',      label:'スキップ（既存はそのまま、新規のみ追加）' },
                ].map(opt => (
                  <label key={opt.k} className="flex items-start gap-2 text-xs text-slate-700">
                    <input type="radio" name="dupmode" checked={mode===opt.k} onChange={()=>setMode(opt.k)} className="mt-0.5"/>
                    {opt.label}
                  </label>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      <details className="rounded-xl border border-slate-200 bg-slate-50 p-3">
        <summary className="cursor-pointer text-xs font-medium text-slate-600">JSON形式の例を見る</summary>
        <pre className="mt-2 overflow-x-auto rounded bg-white p-2 font-mono text-[10px] leading-relaxed text-slate-600">{`[
  {
    "name": "黒田くん",
    "role": "スタッフ",
    "strengths": ["優しい", "素直"],
    "challenges": ["自己評価が低い"],
    "effective_approach": ["存在承認", "成功体験の言語化"],
    "avoid_approach": ["強い否定"],
    "goals": ["自走できる販売スタッフ"],
    "current_status": "成長中",
    "last_interview": "",
    "notes": ""
  }
]`}</pre>
      </details>
    </FullModal>
  );
}

function parseCapture(item) {
  // knowledge_items のcontent文字列からフィールドを抽出
  const c = item.content || '';
  const get = (labels) => {
    for (const lbl of labels) {
      const m = c.match(new RegExp('■ ' + lbl + '\\n([\\s\\S]*?)(?=\\n■ |\\n─|$)'));
      if (m) return m[1].trim();
    }
    return '';
  };
  const typeMap = { education:'教育', interview:'面談', decision:'判断', plan:'企画', general:'その他' };
  const typeKey = (item.tags||[]).find(t=>['education','interview','decision','plan'].includes(t)) || item.category || 'general';
  return {
    date: (item.created_at||'').slice(0,10),
    type: typeKey,
    who:  get(['誰に','誰と']),
    what: get(['何をした','何を話した','何を決めた','何を考えた']),
    why:  get(['なぜそうした','なぜその話をした','なぜそう決めた','なぜやる','なぜ']),
    risk: get(['リスク']) || undefined,
    effect: get(['期待効果']) || undefined,
    next: get(['次どうする']),
    urgent: (item.tags||[]).includes('urgent'),
  };
}

const CAPTURE_EXTRACT_PROMPT = (raw) => `以下のメモから情報を抽出し、ログタイプに分類してください。

## メモ
${raw}

## 出力ルール
- typeはeducation/interview/decision/planのどれか1つ

- whatは何をした・何を話した・何を決めた・何を考えた
- whyはなぜそうしたか（最重要。必ず埋めること）
- riskはリスク（判断の場合のみ。それ以外は空文字）
- effectは期待効果（企画の場合のみ。それ以外は空文字）
- nextは次どうする

説明なしで以下のJSONのみ出力してください：
{
  "type": "education",
  "who": "",
  "what": "",
  "why": "",
  "risk": "",
  "effect": "",
  "next": ""
}`;

const CAPTURE_TYPE_LABELS = {
  education: '📚 教育ログ',
  interview: '💬 面談ログ',
  decision:  '⚖️ 判断ログ',
  plan:      '💡 企画ログ',
};

function buildCaptureContent(p) {
  const type = CAPTURE_TYPE_LABELS[p.type] || p.type;
  const rows = [];
  if (p.who)    rows.push(`■ 誰に\n${p.who}`);
  if (p.what)   rows.push(`■ ${p.type==='decision'?'何を決めた':p.type==='plan'?'何を考えた':'何をした'}\n${p.what}`);
  if (p.why)    rows.push(`■ なぜ\n${p.why}`);
  if (p.risk)   rows.push(`■ リスク\n${p.risk}`);
  if (p.effect) rows.push(`■ 期待効果\n${p.effect}`);
  if (p.next)   rows.push(`■ 次どうする\n${p.next}`);
  return `【${type}】\n\n${rows.join('\n\n')}`;
}
